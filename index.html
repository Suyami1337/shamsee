<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(async () => {
  const hash = window.location.hash;
  const params = new URLSearchParams(window.location.search);

  // Error
  if (hash.includes("error=") || params.get("error")) {
    window.location.href = "auth-mockup.html";
    return;
  }

  // Hash flow with access_token
  if (hash.includes("access_token")) {
    const type = (hash.match(/[#&]type=([^&]*)/) || [])[1];

    if (type === "recovery") {
      // Store hash so reset-password.html can process it
      sessionStorage.setItem("recovery_hash", hash);
      window.location.href = "reset-password.html";
      return;
    }

    // Email confirm or login
    const sb = supabase.createClient(
      "https://kkaixwmqclsudabgofcf.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYWl4d21xY2xzdWRhYmdvZmNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MDc4ODcsImV4cCI6MjA4ODA4Mzg4N30.zD9M-Tthd_FBdcrXuOukEdxuWnIaR0yWfm0CnWyuhb0"
    );
    await sb.auth.getSession();
    window.location.href = "onboarding";
    return;
  }

  // PKCE code flow
  const code = params.get("code");
  if (code) {
    const sb = supabase.createClient(
      "https://kkaixwmqclsudabgofcf.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYWl4d21xY2xzdWRhYmdvZmNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MDc4ODcsImV4cCI6MjA4ODA4Mzg4N30.zD9M-Tthd_FBdcrXuOukEdxuWnIaR0yWfm0CnWyuhb0"
    );
    await sb.auth.exchangeCodeForSession(code);
    const type = params.get("type");
    window.location.href = type === "recovery" ? "reset-password.html" : "onboarding";
    return;
  }

  window.location.href = "auth-mockup.html";
})();
</script>
</head>
<body style="background:#080808;color:#555;font-family:sans-serif;text-align:center;padding:60px">Загрузка...</body>
</html>
