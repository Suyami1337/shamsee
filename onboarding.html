<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Добро пожаловать — MyFinanceAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #06060f; color: #f0f0f0; font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }

  .bg-mesh { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.12; animation: float 14s ease-in-out infinite; }
  .orb-1 { width: 500px; height: 500px; background: #6ee7b7; top: -150px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: #3b82f6; bottom: -100px; right: -80px; animation-delay: -5s; }
  .orb-3 { width: 300px; height: 300px; background: #a78bfa; top: 40%; left: 50%; animation-delay: -9s; }
  @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-30px)} }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .card {
    position: relative; z-index: 1;
    background: rgba(16,16,28,0.97);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 460px;
    margin: 20px;
    animation: fadeUp 0.5s ease forwards;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

  .logo { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
  .logo-name { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 800; letter-spacing: -0.03em; background: linear-gradient(135deg,#6ee7b7,#3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }

  .hero { text-align: center; margin-bottom: 32px; }
  .hero-title { font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800; color: #fff; margin-bottom: 8px; }
  .hero-sub { font-size: 14px; color: #555; line-height: 1.6; }

  .field { margin-bottom: 20px; }
  .field-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .field-input {
    width: 100%; font-size: 15px; padding: 12px 14px;
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 11px; color: #fff; outline: none; font-family: 'Inter', sans-serif;
    transition: border-color 0.15s;
  }
  .field-input:focus { border-color: rgba(110,231,183,0.4); }
  .field-input::placeholder { color: #333; }

  .emoji-grid { display: flex; flex-wrap: wrap; gap: 6px; }
  .emoji-btn {
    width: 40px; height: 40px; border-radius: 9px; font-size: 19px; cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04);
    transition: all 0.12s;
  }
  .emoji-btn.sel { border-color: rgba(110,231,183,0.5); background: rgba(110,231,183,0.15); }

  .color-grid { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-btn {
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
    border: 3px solid transparent; transition: all 0.12s;
  }
  .color-btn.sel { border-color: #fff; transform: scale(1.2); }

  .btn-submit {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: linear-gradient(135deg,#6ee7b7,#3b82f6);
    color: #000; font-size: 15px; font-weight: 700; cursor: pointer;
    font-family: 'Inter', sans-serif; margin-top: 8px;
    transition: opacity 0.15s;
  }
  .btn-submit:hover { opacity: 0.9; }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  .error { color: #f87171; font-size: 13px; text-align: center; margin-top: 12px; display: none; }

  /* ── RESPONSIVE ─────────────────────────────────── */
  @media (max-width: 600px) {
    body {
      align-items: flex-start;
      overflow-y: auto;
      padding: 0;
    }
    .card {
      max-width: 100%;
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      border-radius: 0;
      border: none;
      margin: 0;
      padding: 48px 24px 40px;
      padding-top: max(48px, env(safe-area-inset-top, 48px));
      padding-bottom: max(40px, env(safe-area-inset-bottom, 40px));
      padding-left: max(24px, env(safe-area-inset-left, 24px));
      padding-right: max(24px, env(safe-area-inset-right, 24px));
      animation: none;
    }
    .logo-name { font-size: 24px; }
    .hero { margin-bottom: 28px; }
    .hero-title { font-size: 22px; }
    .hero-sub { font-size: 13px; }
    .field { margin-bottom: 18px; }
    .field-input {
      font-size: 16px;
      padding: 14px 16px;
      min-height: 52px;
    }
    .emoji-grid { gap: 8px; }
    .emoji-btn { width: 44px; height: 44px; font-size: 20px; border-radius: 10px; }
    .color-btn { width: 34px; height: 34px; }
    .btn-submit {
      padding: 17px;
      font-size: 16px;
      min-height: 54px;
      border-radius: 14px;
      margin-top: 12px;
    }
    .orb-1 { width: 280px; height: 280px; }
    .orb-2 { width: 220px; height: 220px; }
    .orb-3 { width: 160px; height: 160px; }
  }
  @media (max-width: 380px) {
    .card { padding: 40px 18px 32px; padding-top: max(40px, env(safe-area-inset-top, 40px)); }
    .emoji-btn { width: 40px; height: 40px; font-size: 18px; }
    .color-btn { width: 30px; height: 30px; }
  }
</style>
</head>
<body>
<div class="bg-mesh"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="orb orb-3"></div></div>
<div class="bg-grid"></div>

<div class="card">
  <div class="logo">
    <div class="logo-name">MyFinanceAI</div>
  </div>
  <div class="hero">
    <div class="hero-title">Добро пожаловать!</div>
    <div class="hero-sub">Создай первый проект — это твоё финансовое<br>пространство со счетами и аналитикой</div>
  </div>

  <div class="field">
    <div class="field-label">Название проекта</div>
    <input id="ob-name" class="field-input" placeholder="Например: Мой бизнес" maxlength="40" autocomplete="off">
  </div>
  <div class="field">
    <div class="field-label">Иконка</div>
    <div class="emoji-grid" id="emoji-grid"></div>
  </div>
  <div class="field">
    <div class="field-label">Цвет</div>
    <div class="color-grid" id="color-grid"></div>
  </div>

  <button class="btn-submit" id="ob-submit">Создать проект и начать →</button>
  <div class="error" id="ob-error"></div>
</div>

<script>
const SUPABASE_URL = 'https://kkaixwmqclsudabgofcf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYWl4d21xY2xzdWRhYmdvZmNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MDc4ODcsImV4cCI6MjA4ODA4Mzg4N30.zD9M-Tthd_FBdcrXuOukEdxuWnIaR0yWfm0CnWyuhb0';
const _SB = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const EMOJIS = ['💼','📊','🏢','🚀','💡','🎯','💰','🌍','🏗️','📱','🎓','🛒','💎','🔥','⚡','🌿'];
const COLORS = ['#6ee7b7','#3b82f6','#a78bfa','#f87171','#fbbf24','#fb923c','#34d399','#e879f9','#38bdf8','#f472b6'];

let selEmoji = '💼';
let selColor = '#6ee7b7';
let _user = null;

// ── Auth check ────────────────────────────────────
(async () => {
  const { data } = await _SB.auth.getSession();
  if (!data.session) { window.location.href = '/login'; return; }
  _user = data.session.user;

  // If user already has projects — go to dashboard
  const { data: projects } = await _SB.from('projects').select('id,name,emoji,color').eq('user_id', _user.id).limit(1);
  if (projects && projects.length > 0) {
    const p = projects[0];
    localStorage.setItem('active_project_id',    p.id);
    localStorage.setItem('active_project_name',  p.name || '');
    localStorage.setItem('active_project_emoji', p.emoji || '💼');
    const now = new Date();
    sessionStorage.setItem('active_month', now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0'));
    window.location.href = '/dashboard';
    return;
  }

  initPickers();
})();

// ── Pickers ───────────────────────────────────────
function initPickers() {
  const emojiGrid = document.getElementById('emoji-grid');
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn' + (e === selEmoji ? ' sel' : '');
    btn.textContent = e;
    btn.onclick = () => {
      selEmoji = e;
      document.querySelectorAll('.emoji-btn').forEach(b => b.classList.toggle('sel', b.textContent === e));
    };
    emojiGrid.appendChild(btn);
  });

  const colorGrid = document.getElementById('color-grid');
  COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'color-btn' + (c === selColor ? ' sel' : '');
    btn.style.background = c;
    btn.dataset.color = c;
    btn.onclick = () => {
      selColor = c;
      document.querySelectorAll('.color-btn').forEach(b => b.classList.toggle('sel', b.dataset.color === c));
    };
    colorGrid.appendChild(btn);
  });
}

// ── Submit ────────────────────────────────────────
document.getElementById('ob-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('ob-submit').click();
});

document.getElementById('ob-submit').onclick = async () => {
  const name = document.getElementById('ob-name').value.trim();
  const errEl = document.getElementById('ob-error');
  errEl.style.display = 'none';

  if (!name) {
    errEl.textContent = 'Введи название проекта';
    errEl.style.display = 'block';
    document.getElementById('ob-name').focus();
    return;
  }

  const btn = document.getElementById('ob-submit');
  btn.disabled = true;
  btn.textContent = 'Создаём...';

  const withTimeout = (promise, ms) => Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('Превышено время ожидания. Проверь соединение.')), ms))
  ]);

  let data;
  try {
    const result = await withTimeout(
      _SB.from('projects').insert({
        user_id: _user.id, name, emoji: selEmoji, color: selColor,
      }).select().single(),
      10000
    );
    if (result.error) throw result.error;
    data = result.data;
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Создать проект и начать →';
    errEl.textContent = 'Ошибка: ' + e.message;
    errEl.style.display = 'block';
    return;
  }

  const defaultData = {
    transactions: [],
    accounts: {
      personal_card: { name: '💳 Личная карта', balance: 0, currency: 'RUB', color: '#6ee7b7' },
      cash:          { name: '💵 Наличные',     balance: 0, currency: 'RUB', color: '#a78bfa' },
    },
    accOrder: ['personal_card', 'cash'],
    funds: {
      cushion: { name: 'Подушка безопасности', balance: 0, currency: 'RUB', icon: '🛡️', color: '#6ee7b7' },
      savings:  { name: 'Накопительный счёт',  balance: 0, currency: 'RUB', icon: '💵', color: '#93c5fd' },
    },
    fundHistory: [], directions: {}, dirCategories: {}, partnerPayments: {},
    rates: { SAR: 20.5, USDT: 90, USD: 90, source: 'fallback', updatedAt: null },
    enabledCurrencies: ['RUB', 'USD'],
    theme: 'dark', lang: 'ru',
    dirOrder: null, fundOrder: null, tabOrder: null,
  };

  const uid = _user.id + '_' + data.id;
  const { error: dataErr } = await _SB.from('user_data').upsert(
    { user_id: uid, project_id: data.id, data: defaultData, updated_at: new Date().toISOString() },
    { onConflict: 'user_id' }
  );
  if (dataErr) console.warn('user_data upsert error:', dataErr.message);

  localStorage.setItem('active_project_id',    data.id);
  localStorage.setItem('active_project_name',  name);
  localStorage.setItem('active_project_emoji', selEmoji);
  const now = new Date();
  sessionStorage.setItem('active_month', now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0'));
  window.location.href = '/dashboard';
};
</script>
</body>
</html>
