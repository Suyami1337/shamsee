<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Выбор месяца</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background:#080808; color:#fff; font-family: 'SF Pro Display', 'Segoe UI', -apple-system, sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .bg-mesh { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.12; animation: float 14s ease-in-out infinite; }
  .orb-1 { width: 500px; height: 500px; background: #6ee7b7; top: -150px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: #3b82f6; bottom: -100px; right: -80px; animation-delay: -5s; }
  @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-30px)} }
  .bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px); background-size: 48px 48px; }
  .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .month-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 24px; cursor: pointer; transition: all 0.2s; position: relative; z-index: 1; }
  .month-card:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); transform: translateY(-2px); }
  .month-label { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 2px; }
  .month-year { font-size: 13px; color:#555; margin-bottom: 16px; }
  .month-stats { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .month-stat-row { display: flex; justify-content: space-between; font-size: 13px; color: #aaa; font-family: monospace; }
  .month-tx-count { font-size: 11px; color:#555; }
  .month-empty { font-size: 13px; color: #444; margin-top: 8px; }
  .year-tab { padding: 10px 24px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.03); color: #666; font-size: 16px; font-weight: 700; cursor: pointer; transition: all 0.15s; }
  .year-tab:hover { color: #ccc; border-color: rgba(255,255,255,0.15); }
  .year-tab.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); color: #fff; }
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal { background: rgba(16,16,28,0.98); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 32px; width: 100%; max-width: 420px; }
  @media (max-width: 700px) { .month-grid { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 480px) { .month-grid { grid-template-columns: 1fr; } }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<div class="bg-mesh"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="bg-grid"></div>
<body>
<div id="app" style="position:relative;z-index:1">
  <div style="text-align:center;padding:60px;color:#555">Загрузка...</div>
</div>

<script>
const _SB = supabase.createClient(
  'https://kkaixwmqclsudabgofcf.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYWl4d21xY2xzdWRhYmdvZmNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MDc4ODcsImV4cCI6MjA4ODA4Mzg4N30.zD9M-Tthd_FBdcrXuOukEdxuWnIaR0yWfm0CnWyuhb0'
);

let _currentUser = null;
let _projectId   = null;
let _projectName = '';
let _projectEmoji= '💼';

const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const START_YEAR = 2024;

let state = {
  transactions: [],
  rates: { SAR: 20.5, USDT: 77 },
  selectedYear: new Date().getFullYear(),
  showProfileModal: false,
};

function toRub(amount, currency) {
  if (currency === 'RUB') return amount;
  if (currency === 'SAR') return amount * state.rates.SAR;
  if (currency === 'USDT') return amount * state.rates.USDT;
  return amount;
}

function fmt(n) {
  return new Intl.NumberFormat('ru-RU', { maximumFractionDigits: 0 }).format(n) + ' ₽';
}

function getMonthKey(date) {
  const d = new Date(date);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

function loadFromStorage() {
  // localStorage removed — all data comes from Supabase cloud
}

async function cloudLoad() {
  if (!_currentUser || !_projectId) return null;
  const uid = _currentUser.id + '_' + _projectId;
  const { data } = await _SB.from('user_data').select('data').eq('user_id', uid).single();
  return data ? data.data : null;
}

function render() {
  document.getElementById('app').innerHTML = pageHtml();
  bindEvents();
}

function pageHtml() {
  const currentYear = new Date().getFullYear();
  const years = [];
  for (let y = START_YEAR; y <= currentYear; y++) years.push(y);

  const yearTabs = years.map(y => `
    <button class="year-tab ${y === state.selectedYear ? 'active' : ''}" data-year="${y}">${y}</button>
  `).join('');

  const allMonths = [];
  for (let m = 1; m <= 12; m++) {
    allMonths.push(state.selectedYear + '-' + String(m).padStart(2,'0'));
  }

  const qColors = {
    1: { border: 'rgba(110,231,183,0.35)', bg: 'rgba(110,231,183,0.06)', num: '#6ee7b7', label: 'Q1' },
    2: { border: 'rgba(147,197,253,0.35)', bg: 'rgba(147,197,253,0.06)', num: '#93c5fd', label: 'Q2' },
    3: { border: 'rgba(251,191,36,0.35)',  bg: 'rgba(251,191,36,0.06)',  num: '#fbbf24', label: 'Q3' },
    4: { border: 'rgba(240,120,120,0.35)', bg: 'rgba(240,120,120,0.06)', num: '#f87171', label: 'Q4' },
  };

  const monthCards = allMonths.map(mk => {
    const [year, month] = mk.split('-');
    const monthName = MONTHS[parseInt(month)-1];
    const txs = state.transactions.filter(t => getMonthKey(t.date) === mk);
    const txCount = txs.length;
    const hasData = txCount > 0;
    const income  = txs.filter(t=>t.type==='income').reduce((s,t)=>s+toRub(t.amount,t.currency),0);
    const expense = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+toRub(t.amount,t.currency),0);
    const profit  = income - expense;
    const q = Math.ceil(parseInt(month)/3);
    const qc = qColors[q];

    return `<div class="month-card" data-month="${mk}" style="border-color:${qc.border};background:${qc.bg}">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:13px;font-weight:700;color:${qc.num};letter-spacing:0.05em">${month}</div>
        <div style="font-size:10px;color:${qc.num};opacity:0.7;letter-spacing:0.1em">${qc.label}</div>
      </div>
      <div class="month-label">${monthName}</div>
      <div class="month-year">${year}</div>
      ${hasData ? `
        <div class="month-stats">
          <div class="month-stat-row"><span style="color:#6ee7b7">💚</span><span>${fmt(income)}</span></div>
          <div class="month-stat-row"><span style="color:#f87171">🔴</span><span>${fmt(expense)}</span></div>
          <div class="month-stat-row" style="border-top:1px solid rgba(255,255,255,0.08);padding-top:6px;margin-top:4px">
            <span style="color:#a78bfa">💜</span>
            <span style="color:${profit>=0?'#a78bfa':'#f87171'};font-weight:700">${fmt(profit)}</span>
          </div>
        </div>
        <div class="month-tx-count">${txCount} операций</div>
      ` : '<div class="month-empty">Нет данных</div>'}
    </div>`;
  }).join('');

  return `
    <div style="min-height:100vh">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 20px;background:rgba(15,15,25,0.95);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.07);position:fixed;top:0;left:0;right:0;z-index:100">
        <div style="display:flex;align-items:center;gap:10px">
          <button id="btn-to-projects" style="background:none;border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#888;font-size:12px;cursor:pointer;padding:5px 10px">← Проекты</button>
          <div style="width:1px;height:18px;background:rgba(255,255,255,0.08)"></div>
          <div style="font-size:15px;font-weight:700;color:#fff">${_projectEmoji} ${_projectName}</div>
        </div>
        <div style="font-size:22px;font-weight:900;color:#fff;letter-spacing:-0.03em;position:absolute;left:50%;transform:translateX(-50%)">Выбор месяца</div>
        <div style="display:flex;gap:10px">
          <button id="btn-profile" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#bbb;font-size:13px;font-weight:600;cursor:pointer;padding:10px 16px">👤 Личный кабинет</button>
        </div>
      </div>

      <div style="max-width:1000px;margin:0 auto;padding:90px 20px 40px;position:relative;z-index:1">
        <div style="margin-bottom:32px">
          <div style="font-size:11px;color:#555;letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px">Финансовый дашборд · ${_projectEmoji} ${_projectName}</div>
          <div style="font-size:32px;font-weight:800;letter-spacing:-0.02em">Выберите год и месяц</div>
          <div style="font-size:15px;color:#555;margin-top:6px">Данные каждого периода хранятся отдельно</div>
        </div>

        <div style="display:flex;gap:10px;margin-bottom:32px">
          ${yearTabs}
        </div>

        <div class="month-grid">${monthCards}</div>
      </div>

      ${state.showProfileModal ? profileModalHtml() : ''}
    </div>`;
}

function profileModalHtml() {
  const user = _currentUser || {};
  const email = user.email || '';
  const name = (user.user_metadata && user.user_metadata.full_name) ? user.user_metadata.full_name : email.split('@')[0];
  const created = user.created_at ? new Date(user.created_at) : null;
  const mos = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const createdStr = created ? (created.getDate() + ' ' + mos[created.getMonth()] + ' ' + created.getFullYear()) : '—';
  return `
    <div class="modal-bg" id="profile-modal-bg">
      <div class="modal" style="max-width:420px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px">
          <div style="font-size:20px;font-weight:800;color:#fff">👤 Личный кабинет</div>
          <button id="btn-profile-close" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#666;font-size:20px;cursor:pointer;padding:4px 10px;line-height:1">×</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:28px">
          <div style="padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px">
            <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px">Имя</div>
            <div style="font-size:15px;font-weight:600;color:#fff">${name}</div>
          </div>
          <div style="padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px">
            <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px">Почта</div>
            <div style="font-size:15px;font-weight:600;color:#fff">${email}</div>
          </div>
          <div style="padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px">
            <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px">Дата регистрации</div>
            <div style="font-size:15px;font-weight:600;color:#fff">${createdStr}</div>
          </div>
        </div>
        <button id="btn-change-password" style="width:100%;padding:12px;border-radius:11px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#ccc;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px">🔐 Сменить пароль</button>
        <button id="btn-logout" style="width:100%;padding:12px;border-radius:11px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.07);color:#f87171;font-size:14px;font-weight:600;cursor:pointer">Выйти из аккаунта</button>
      </div>
    </div>`;
}

function bindEvents() {
  document.getElementById('app').addEventListener('click', function(e) {
    if (e.target.closest('#btn-to-projects')) { window.location.href = '/projects'; return; }
    if (e.target.closest('#btn-profile')) { state.showProfileModal = true; render(); return; }
    if (e.target.closest('#btn-profile-close')) { state.showProfileModal = false; render(); return; }
    if (e.target.id === 'profile-modal-bg') { state.showProfileModal = false; render(); return; }
    if (e.target.closest('#btn-logout')) {
      _SB.auth.signOut().then(() => { window.location.href = '/login'; }); return;
    }
    if (e.target.closest('#btn-change-password')) {
      const email = (_currentUser || {}).email;
      if (email) _SB.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/' })
        .then(() => alert('Письмо отправлено на ' + email));
      return;
    }
    // Year tab
    const yearBtn = e.target.closest('[data-year]');
    if (yearBtn) { state.selectedYear = parseInt(yearBtn.dataset.year); render(); return; }
    // Month card
    const card = e.target.closest('[data-month]');
    if (card) {
      sessionStorage.setItem('active_month', card.dataset.month);
      window.location.href = '/dashboard';
    }
  });
}

(async () => {
  const { data } = await _SB.auth.getSession();
  if (!data.session) { window.location.href = '/login'; return; }
  _currentUser  = data.session.user;
  _projectId    = sessionStorage.getItem('active_project_id');
  _projectName  = sessionStorage.getItem('active_project_name') || '';
  _projectEmoji = sessionStorage.getItem('active_project_emoji') || '💼';
  if (!_projectId) { window.location.href = '/projects'; return; }

  loadFromStorage(); // no-op, kept for safety
  const cloud = await cloudLoad();
  if (cloud) {
    state.transactions = cloud.transactions || [];
    state.rates = cloud.rates || state.rates;
  }
  render();
})();
</script>
</body>
</html>
