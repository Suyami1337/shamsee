<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MyFinanceAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --green:  #6ee7b7;
    --blue:   #3b82f6;
    --purple: #a78bfa;
    --red:    #f87171;
    --yellow: #fbbf24;
    --bg:     #07070f;
    --card:   rgba(255,255,255,0.04);
    --border: rgba(255,255,255,0.08);
    --text:   #f0f0f0;
    --muted:  #777;
    --dim:    #444;
    --topbar-h: 54px;
    --tabbar-h: 58px;
    --botbar-h: 72px;
  }

  html {
    height: 100%;
    height: 100dvh;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100%;
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  /* ── BACKGROUND ── */
  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .orb { position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.09; }
  .orb-1 { width: 280px; height: 280px; background: #6ee7b7; top: -60px; left: -60px; animation: drift 12s ease-in-out infinite; }
  .orb-2 { width: 220px; height: 220px; background: #3b82f6; bottom: -40px; right: -40px; animation: drift 16s ease-in-out infinite reverse; }
  .orb-3 { width: 160px; height: 160px; background: #a78bfa; top: 45%; left: 55%; animation: drift 10s ease-in-out infinite 3s; }
  @keyframes drift { 0%,100%{transform:translate(0,0)} 50%{transform:translate(18px,-22px)} }
  .bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px); background-size: 44px 44px; }

  /* ── TOP BAR ── */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--topbar-h);
    background: rgba(7,7,15,0.95);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 8px;
  }
  .top-project {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 10px; cursor: pointer;
    transition: background 0.15s;
    max-width: 150px;
  }
  .top-project:active { background: rgba(255,255,255,0.09); }
  .top-project-emoji { font-size: 13px; }
  .top-project-name { font-size: 11px; font-weight: 700; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-project-arrow { font-size: 10px; color: var(--dim); flex-shrink: 0; }

  .top-period {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 10px; cursor: pointer;
    font-size: 11px; font-weight: 600; color: #bbb;
    transition: all 0.15s; white-space: nowrap;
    max-width: 120px; overflow: hidden; text-overflow: ellipsis;
  }
  .top-period:active { background: rgba(255,255,255,0.09); }
  .top-period.active { background: rgba(167,139,250,0.12); border-color: rgba(167,139,250,0.35); color: var(--purple); }

  /* ── TAB BAR ── */
  .tabbar {
    position: fixed;
    top: var(--topbar-h); left: 0; right: 0; z-index: 99;
    height: var(--tabbar-h);
    background: rgba(7,7,15,0.92);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 6px 10px; gap: 4px;
  }
  .tab {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 8px 2px; border-radius: 11px;
    background: transparent; border: 1px solid transparent;
    color: var(--muted); font-size: 10px; font-weight: 500;
    font-family: 'Inter', sans-serif;
    cursor: pointer; transition: all 0.15s;
  }
  .tab-icon { font-size: 18px; line-height: 1; }
  .tab.active {
    background: linear-gradient(135deg, rgba(110,231,183,0.14), rgba(59,130,246,0.14));
    border: 1px solid rgba(110,231,183,0.22);
    color: #fff; font-weight: 700;
  }
  .tab:active:not(.active) { background: rgba(255,255,255,0.05); }

  /* ── CONTENT AREA ── */
  .content {
    position: fixed;
    top: calc(var(--topbar-h) + var(--tabbar-h));
    left: 0; right: 0;
    bottom: var(--botbar-h);
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior-y: contain;
    touch-action: pan-y;
    z-index: 1;
  }
  .content-inner { padding: 16px 14px 8px; }

  /* ── BOTTOM BAR ── */
  .botbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    height: var(--botbar-h);
    background: rgba(7,7,15,0.97);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-around;
    padding: 0 10px 4px;
  }
  .bot-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer;
    color: var(--muted); font-size: 10px; font-weight: 500;
    font-family: 'Inter', sans-serif;
    padding: 8px 20px; border-radius: 14px;
    transition: all 0.15s;
  }
  .bot-btn-icon { font-size: 22px; line-height: 1; }
  .bot-btn:active { background: rgba(255,255,255,0.06); color: #ccc; }

  .bot-add {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; padding: 4px 10px;
  }
  .bot-add-ring {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--green), var(--blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 300; color: #000; line-height: 1;
    box-shadow: 0 0 0 0 rgba(110,231,183,0.4);
    transition: transform 0.12s, box-shadow 0.2s;
  }
  .bot-add-ring.open {
    background: linear-gradient(135deg, #f87171, #a78bfa);
    transform: rotate(45deg);
    box-shadow: 0 0 0 8px rgba(110,231,183,0.1);
  }
  .bot-add:active .bot-add-ring { transform: scale(0.9); }
  .bot-add-ring.open:active { transform: rotate(45deg) scale(0.9); }
  .bot-add-label { font-size: 10px; color: var(--green); font-weight: 600; }

  /* ── ADD MENU POPUP ── */
  .add-menu-overlay { position: fixed; inset: 0; z-index: 199; }
  .add-menu {
    position: fixed;
    bottom: calc(var(--botbar-h) + 12px);
    left: 50%; transform: translateX(-50%);
    z-index: 200;
    background: rgba(14,14,26,0.99);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 22px; padding: 10px;
    min-width: 230px;
    box-shadow: 0 -12px 50px rgba(0,0,0,0.7);
    animation: popUp 0.18s ease;
  }
  @keyframes popUp { from{opacity:0;transform:translateX(-50%) translateY(12px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  .add-menu-item {
    display: flex; align-items: center; gap: 14px;
    width: 100%; padding: 14px 16px; border-radius: 14px;
    border: none; background: transparent; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
    color: #ddd; text-align: left; transition: background 0.12s;
  }
  .add-menu-item:active { background: rgba(255,255,255,0.08); }
  .add-menu-item + .add-menu-item { margin-top: 2px; }
  .add-menu-item-icon { font-size: 22px; width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .ami-manual { background: rgba(110,231,183,0.1); }
  .ami-ai     { background: rgba(167,139,250,0.12); }
  .add-menu-item.ai-item { color: var(--purple); }

  /* ── STATS GRID ── */
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 16px 14px;
    position: relative; overflow: hidden;
  }
  .stat-card-bg { position: absolute; right: -8px; top: -8px; font-size: 48px; opacity: 0.06; }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .stat-val { font-size: 17px; font-weight: 700; font-family: monospace; }

  /* ── SECTION TITLE ── */
  .sec-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; margin-top: 6px; }

  /* ── CARD ── */
  .m-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; margin-bottom: 12px; }
  .m-card-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .m-card-title { font-size: 14px; font-weight: 700; }

  /* ── TX ROWS ── */
  .tx-row {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer; transition: background 0.1s;
  }
  .tx-row:last-child { border-bottom: none; }
  .tx-row:active { background: rgba(255,255,255,0.04); }
  .tx-ico { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 17px; flex-shrink: 0; }
  .tx-ico-in  { background: rgba(110,231,183,0.13); }
  .tx-ico-out { background: rgba(239,68,68,0.12); }
  .tx-ico-tr  { background: rgba(167,139,250,0.12); }
  .tx-info { flex: 1; min-width: 0; }
  .tx-cat  { font-size: 13px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .tx-right { text-align: right; flex-shrink: 0; }
  .tx-amt { font-size: 14px; font-weight: 700; font-family: monospace; }
  .tx-in  { color: var(--green); }
  .tx-out { color: var(--red); }
  .tx-sub { font-size: 10px; color: var(--dim); margin-top: 2px; }

  /* ── ACC ROWS ── */
  .acc-row { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .acc-row:last-child { border-bottom: none; }
  .acc-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .acc-info { flex: 1; }
  .acc-name { font-size: 13px; color: #ddd; }
  .acc-cur  { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .acc-right { text-align: right; }
  .acc-bal  { font-size: 14px; font-weight: 700; font-family: monospace; }
  .acc-sub  { font-size: 10px; color: var(--muted); margin-top: 1px; }

  /* ── FUNDS ── */
  .fund-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
  .fund-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .fund-icon-name { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
  .fund-bal { font-size: 20px; font-weight: 700; font-family: monospace; margin-top: 4px; }
  .fund-btns { display: flex; gap: 6px; margin-top: 12px; }
  .fund-btn { flex: 1; padding: 9px; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; border: none; transition: opacity 0.15s; }
  .fund-btn:active { opacity: 0.7; }
  .fb-in   { background: rgba(110,231,183,0.12); color: var(--green); border: 1px solid rgba(110,231,183,0.25); }
  .fb-out  { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.22); }
  .fb-hist { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); }

  /* ── DIR CARDS ── */
  .dir-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 10px; cursor: pointer; transition: border-color 0.15s; }
  .dir-card:active { border-color: rgba(255,255,255,0.18); }
  .dir-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .dir-left { display: flex; align-items: center; gap: 10px; }
  .dir-emoji { font-size: 26px; }
  .dir-name { font-size: 15px; font-weight: 700; }
  .dir-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .dmetric { border-radius: 10px; padding: 10px 12px; }
  .dmetric-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .dmetric-val { font-size: 14px; font-weight: 700; font-family: monospace; }
  .dm-green  { background: rgba(110,231,183,0.07); } .dm-green .dmetric-val  { color: var(--green); }
  .dm-red    { background: rgba(239,68,68,0.07); }   .dm-red .dmetric-val    { color: var(--red); }
  .dm-purple { background: rgba(167,139,250,0.07); } .dm-purple .dmetric-val { color: var(--purple); }
  .dm-dim    { background: rgba(255,255,255,0.04); } .dm-dim .dmetric-val    { color: #ccc; }

  /* ── ANALYTICS CHART PLACEHOLDER ── */
  .chart-ph { background: rgba(255,255,255,0.02); border-radius: 12px; height: 160px; display: flex; align-items: center; justify-content: center; color: var(--dim); font-size: 13px; margin: 12px 0; }
  .chart-bars { display: flex; align-items: flex-end; gap: 6px; height: 100px; padding: 0 16px; }
  .bar { border-radius: 4px 4px 0 0; flex: 1; transition: height 0.3s; }

  /* ── RATES STRIP ── */
  .rates-strip { display: flex; gap: 16px; overflow-x: auto; padding: 10px 0; margin-bottom: 14px; scrollbar-width: none; }
  .rates-strip::-webkit-scrollbar { display: none; }
  .rate-chip { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 10px; padding: 8px 12px; white-space: nowrap; font-size: 12px; color: var(--muted); flex-shrink: 0; }
  .rate-chip strong { color: var(--yellow); }
  .rate-chip .usdt { color: var(--purple); }

  /* ── FILTER CHIPS ── */
  .filters { display: flex; gap: 6px; overflow-x: auto; margin-bottom: 14px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .chip { padding: 7px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12); background: transparent; color: #aaa; cursor: pointer; font-size: 12px; white-space: nowrap; font-family: 'Inter', sans-serif; transition: all 0.15s; }
  .chip.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.28); color: #fff; }
  .chip:active { background: rgba(255,255,255,0.07); }

  /* ── SHEET MODAL ── */
  .sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 300; display: flex; align-items: flex-end; animation: fadein 0.15s; }
  @keyframes fadein { from{opacity:0} to{opacity:1} }
  .sheet { background: #0f0f1e; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px 24px 0 0; padding: 24px 20px 36px; width: 100%; max-height: 85vh; overflow-y: auto; animation: slideUp 0.22s ease; }
  @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
  .sheet-handle { width: 36px; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; margin: 0 auto 20px; }
  .sheet-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 20px; }
  .sheet-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 14px; cursor: pointer; transition: background 0.12s; margin-bottom: 6px; }
  .sheet-item:active { background: rgba(255,255,255,0.07); }
  .sheet-item-icon { font-size: 24px; width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .sheet-item-text strong { display: block; font-size: 15px; font-weight: 700; color: #fff; }
  .sheet-item-text span { font-size: 12px; color: var(--muted); }

  /* ── HIDDEN ── */
  .hidden { display: none !important; }

  /* ── FADE TRANSITION ── */
  .tab-content { animation: fadeSlide 0.18s ease; }
  @keyframes fadeSlide { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
</style>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background:#07070f; color:#fff; font-family: 'SF Pro Display', 'Segoe UI', -apple-system, sans-serif; min-height: 100vh; transition: background 0.2s, color 0.2s; }
  body.light { background: #f4f6fb !important; color: #1a1a2e !important; }
  select, input { outline: none; }
  select option { background: #1a1a1a; color:#fff; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .app { max-width: 1200px; margin: 0 auto; padding: 24px 20px; padding-top: 80px; }
  .header { display: flex; flex-direction: column; gap: 10px; padding: 14px 20px 12px; background: rgba(15,15,25,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.07); position: sticky; top: 0; z-index: 100; margin-bottom: 24px; }
  .header-left .subtitle { font-size: 11px; color:#555; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
  .header-left .title { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
  .header-right { display: flex; gap: 10px; }
  .btn-rates { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 16px; color:#888; font-size: 13px; cursor: pointer; }
  .btn-add { background: linear-gradient(135deg, #6ee7b7, #3b82f6); border: none; border-radius: 12px; padding: 10px 20px; color: #000; font-weight: 700; font-size: 14px; cursor: pointer; }
  .btn-rates:hover { background: rgba(255,255,255,0.1); }
  .btn-add:hover { opacity: 0.9; }
  .rates-bar { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 10px 20px; margin-bottom: 24px; display: flex; gap: 24px; font-size: 13px; color:#888; flex-wrap: wrap; align-items: center; }
  .rates-bar strong { color: #fbbf24; }
  .rates-bar .usdt { color: #a78bfa; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px 24px; position: relative; overflow: hidden; }
  .stat-card .icon { position: absolute; top: -10px; right: -10px; font-size: 64px; opacity: 0.07; }
  .stat-card .label { font-size: 12px; color:#888; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-card .value { font-size: 24px; font-weight: 700; font-family: monospace; }
  .tabs { display: flex; gap: 6px; margin-bottom: 24px; background: rgba(255,255,255,0.03); border-radius: 16px; padding: 5px; }
  .tab { flex: 1; padding: 12px 10px; border-radius: 11px; background: transparent; border: none; color:#666; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .tab.active { background: linear-gradient(135deg, rgba(110,231,183,0.15), rgba(59,130,246,0.15)); border: 1px solid rgba(110,231,183,0.2); color:#fff; font-weight: 700; }
  .tab:hover:not(.active) { color: #bbb; background: rgba(255,255,255,0.04); }
  .dir-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .dir-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 24px; cursor: grab; transition: all 0.2s; }
  .dir-card:active { cursor: grabbing; }
  .dir-card:hover { border-color: rgba(255,255,255,0.15); }
  .dir-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .dir-icon { font-size: 28px; }
  .dir-name { font-size: 16px; font-weight: 700; }
  .dir-sub { font-size: 11px; color:#888; }
  .dir-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .metric { border-radius: 10px; padding: 10px 14px; }
  .metric .m-label { font-size: 11px; color:#888; margin-bottom: 4px; }
  .metric .m-value { font-size: 15px; font-weight: 700; font-family: monospace; }
  .metric-income { background: rgba(110,231,183,0.07); } .metric-income .m-value { color: #6ee7b7; }
  .metric-expense { background: rgba(239,68,68,0.07); } .metric-expense .m-value { color: #f87171; }

<script>
// ── Mobile init ──────────────────────────────────
// All shared logic (Supabase, state, data, utils, render functions) is in shared.js.

// Search render — preserves caret position
function _renderWithoutSearchBlur() {
  const el = document.getElementById('m-tx-search');
  const val = el ? el.value : null;
  const pos = el ? el.selectionStart : null;
  render();
  const el2 = document.getElementById('m-tx-search');
  if (el2 && val !== null) { el2.value = val; el2.focus(); if (pos !== null) el2.setSelectionRange(pos, pos); }
}

// Global delegated close handler for all modals — runs once
document.addEventListener('click', function(e) {
  // ── Advanced filter sheet ──
  if (e.target.id === 'm-adv-close' || e.target.id === 'm-adv-bg') {
    state.showMobileAdvFilter = false; render(); return;
  }
  if (e.target.id === 'm-adv-apply') {
    state.showMobileAdvFilter = false; render(); return;
  }
  if (e.target.id === 'm-adv-reset') {
    state.txCatFilter = []; state.txDateFrom = ''; state.txDateTo = '';
    state.showMobileAdvFilter = false; render(); return;
  }
  if (e.target.id === 'cat-pick-all') {
    const allC = [...getDirCats('_global','in').filter(c=>c!=='Перевод входящий'), ...getDirCats('_global','out').filter(c=>c!=='Перевод исходящий')];
    state.txCatFilter = allC; render(); return;
  }
  if (e.target.id === 'cat-pick-none') {
    state.txCatFilter = []; render(); return;
  }
  const catChk = e.target.closest('[data-cat-check]');
  if (catChk) {
    const c = catChk.dataset.catCheck;
    if (!state.txCatFilter) state.txCatFilter = [];
    const idx = state.txCatFilter.indexOf(c);
    if (idx >= 0) state.txCatFilter.splice(idx, 1); else state.txCatFilter.push(c);
    render(); return;
  }
  // edit-tx modal — close
  if (e.target.id === 'edit-tx-close' || e.target.id === 'edit-tx-bg') {
    state.showEditTxModal = null; render(); return;
  }
  // tx detail modal — close
  if (e.target.id === 'detail-close' || e.target.id === 'tx-detail-bg') {
    state.showTxDetail = null; state.showEditTxModal = null; render(); return;
  }
  // edit button inside detail modal
  const txEditBtn = e.target.closest('[data-tx-edit]');
  if (txEditBtn) {
    const txId = txEditBtn.dataset.txEdit;
    state.showTxDetail = null;
    state.showEditTxModal = txId;
    render(); return;
  }
});

// Override transactionsHtml with mockup design
const _origTransactionsHtml = transactionsHtml;
transactionsHtml = function() {
  const txs = monthTxs();
  const accounts = getOrderedAccounts();

  // Filter chips for accounts
  const accChips = accounts.map(k => {
    const a = state.accounts[k];
    const active = state.activeDir === k ? ' active' : '';
    return '<button class="m-tx-chip' + active + '" onclick="state.activeDir=\'' + k + '\';render()">' + (a.icon||'💳') + ' ' + a.name + '</button>';
  }).join('');

  // ── ROW 1: Account chips + divider + individual fund chips
  const allAccChips = getOrderedAccounts().map(function(k) {
    const a = state.accounts[k];
    const active = state.activeDir === k;
    const abalStr = ' <span style="font-size:10px;opacity:0.65">' + fmt(a.balance, a.currency) + '</span>';
    return '<button class="m-tx-chip' + (active?' active':'') + '" onclick="state.activeDir=\'' + k + '\';render()">' + (a.emoji||'') + ' ' + a.name + abalStr + '</button>';
  }).join('');
  const fundChips = Object.entries(state.funds||{}).map(function(entry) {
    const fk = entry[0]; const f = entry[1];
    const active = state.activeDir === fk;
    const fbalStr = f.balance != null ? ' <span style="font-size:10px;opacity:0.65">' + fmt(f.balance, f.currency||'RUB') + '</span>' : '';
    return '<button class="m-tx-chip' + (active?' active':'') + '" onclick="state.activeDir=\'' + fk + '\';render()">' + (f.emoji||'💰') + ' ' + f.name + fbalStr + '</button>';
  }).join('');
  const sep = '<span style="width:1px;height:20px;background:rgba(255,255,255,0.1);flex-shrink:0;align-self:center;display:inline-block;margin:0 4px"></span>';
  const allAccActive = !state.activeDir || state.activeDir === 'all';
  const row1 = '<div class="m-tx-filters" style="margin-bottom:10px">'
    + '<button class="m-tx-chip' + (allAccActive?' active':'') + '" onclick="state.activeDir=null;render()">Все счета</button>'
    + sep
    + allAccChips
    + sep
    + fundChips
    + '</div>';

  // ── ROW 2: Type chips
  const typeFilters = [
    ['income',   '🟢 Доход',     '#6ee7b7', 'rgba(110,231,183,0.12)', 'rgba(110,231,183,0.3)'],
    ['expense',  '🔴 Расход',    '#f87171', 'rgba(239,68,68,0.12)',   'rgba(239,68,68,0.3)'],
    ['transfer', '🟡 Перевод',   '#fbbf24', 'rgba(251,191,36,0.12)',  'rgba(251,191,36,0.3)'],
    ['dividend', '🟣 Дивиденды', '#a78bfa', 'rgba(167,139,250,0.12)', 'rgba(167,139,250,0.3)'],
  ];
  if (!state.txTypeFilter) state.txTypeFilter = ['income','expense','transfer','dividend'];
  const row2 = '<div class="m-tx-filters" style="margin-bottom:10px">'
    + typeFilters.map(function(tf) {
        const active = state.txTypeFilter.includes(tf[0]);
        return '<button onclick="(function(){var idx=state.txTypeFilter.indexOf(\'' + tf[0] + '\');idx>=0?state.txTypeFilter.splice(idx,1):state.txTypeFilter.push(\'' + tf[0] + '\');render();})()" class="m-tx-chip' + (active?' active':'') + '" style="color:' + (active?tf[2]:'#555') + ';border-color:' + (active?tf[4]:'rgba(255,255,255,0.08)') + ';background:' + (active?tf[3]:'transparent') + '">' + tf[1] + '</button>';
      }).join('')
    + '</div>';

  // ── ROW 3: Search + Filter button
  const hasAdvFilter = (state.txCatFilter && state.txCatFilter.length) || state.txDateFrom || state.txDateTo;
  const row3 = '<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">'
    + '<div style="position:relative;flex:1;display:flex;align-items:center">'
    + '<input id="m-tx-search" type="text" placeholder="🔍 Поиск..." value="' + (state.txSearch||'') + '" oninput="state.txSearch=this.value;_renderWithoutSearchBlur()" style="width:100%;box-sizing:border-box;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:9px ' + (state.txSearch?'36px':'14px') + ' 9px 14px;color:#ccc;font-size:13px;outline:none;font-family:inherit">'
    + (state.txSearch ? '<button onclick="state.txSearch=\'\';render()" style="position:absolute;right:10px;background:none;border:none;color:#666;cursor:pointer;font-size:17px;line-height:1;padding:0">×</button>' : '')
    + '</div>'
    + '<button onclick="state.showMobileAdvFilter=true;render()" style="flex-shrink:0;padding:9px 14px;border-radius:12px;border:1px solid ' + (hasAdvFilter?'rgba(167,139,250,0.5)':'rgba(255,255,255,0.1)') + ';background:' + (hasAdvFilter?'rgba(167,139,250,0.12)':'rgba(255,255,255,0.04)') + ';color:' + (hasAdvFilter?'#a78bfa':'#666') + ';cursor:pointer;font-size:12px;font-family:inherit;white-space:nowrap">⚙️ Фильтр' + (hasAdvFilter?' ●':'') + '</button>'
    + '</div>';

  const filterChips = row1 + row2 + row3;

  // Apply filters
  const txTypeF = state.txTypeFilter || ['income','expense','transfer','dividend'];
  let filtered = txs.filter(t => {
    const tt = (t.isTransfer || t.type==='transfer') ? 'transfer' : (t.type==='fund_in'||t.type==='fund_out') ? 'transfer' : t.type;
    return txTypeF.includes(tt);
  });
  if (state.activeDir && state.accounts[state.activeDir]) {
    filtered = filtered.filter(t =>
      t.account === state.activeDir ||
      ((t.isTransfer || t.type==='transfer') && (t.fromAccount === state.activeDir || t.toAccount === state.activeDir))
    );
  } else if (state.activeDir && state.funds && state.funds[state.activeDir]) {
    // Fund selected — show transactions with isFund=true and matching fundKey
    filtered = filtered.filter(function(t) { return t.fundKey === state.activeDir || (t.isFund && (t.fromAccount === state.activeDir || t.toAccount === state.activeDir)); });
  }
  if (state.txSearch) { const q = state.txSearch.toLowerCase(); filtered = filtered.filter(t => (t.note||'').toLowerCase().includes(q) || (t.category||'').toLowerCase().includes(q)); }
  if (state.txCatFilter && state.txCatFilter.length) filtered = filtered.filter(t => state.txCatFilter.includes(t.category));
  if (state.txDateFrom) filtered = filtered.filter(t => t.date >= state.txDateFrom);
  if (state.txDateTo)   filtered = filtered.filter(t => t.date <= state.txDateTo);

  if (!filtered.length) {
    return '<div class="tab-content">'
      + '<div id="m-tx-filter-bar">' + filterChips + '</div>'
      + '<div id="m-tx-list"><div style="text-align:center;color:#555;padding:48px 0;font-size:14px">Нет операций</div></div>'
      + '</div>';
  }

  // Group by date — newest first
  const groups = {};
  const sortedFiltered = filtered.slice().sort((a,b) => { const dd = new Date(b.date) - new Date(a.date); return dd !== 0 ? dd : (function(a,b){
          const ac = a.createdAt||0, bc = b.createdAt||0;
          const isDivIncPair = (div, inc) =>
            div.type==='dividend' && inc.type==='income' &&
            (div.linkedIncomeTxId===inc.id || inc.linkedDividendTxId===div.id ||
             (div.date===inc.date && parseFloat(div.amount)===parseFloat(inc.amount) &&
              (inc.category==='Дивиденды собственника'||inc.category==='Дивиденды')));
          if (isDivIncPair(a,b)) return -1;
          if (isDivIncPair(b,a)) return 1;
          return bc - ac;
        })(a,b); });
  sortedFiltered.forEach(t => {
    if (!groups[t.date]) groups[t.date] = [];
    groups[t.date].push(t);
  });

  const MONTHS_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const dateLabel = d => {
    const parts = d.split('-');
    return parseInt(parts[2]) + ' ' + MONTHS_GEN[parseInt(parts[1])-1] + ' ' + parts[0];
  };

  const rows = Object.entries(groups).sort((a,b) => b[0].localeCompare(a[0])).map(function(entry) {
    const date = entry[0], txList = entry[1];
    const txRows = txList.map(function(t) {
      const isTransfer = t.isTransfer || t.type === 'transfer';
      const isDividend = t.type === 'dividend';
      const isIn  = t.type === 'income' || t.type === 'fund_in';
      const isOut = t.type === 'expense' || t.type === 'fund_out';
      // Amount display — transfers show −from / +to, dividends show −amount
      let amtClass, amtDisplay, sub;
      if (isTransfer) {
        const fromAmt2  = parseFloat(t.fromAmount || t.amount) || 0;
        const toAmt2    = parseFloat(t.toAmount   || t.amount) || 0;
        const fromCur2  = t.fromCurrency || (state.accounts[t.fromAccount]||{}).currency || 'RUB';
        const toCur2    = t.toCurrency   || (state.accounts[t.toAccount]  ||(state.funds||{})[t.toAccount]||{}).currency || fromCur2;
        const fromLbl2  = fromCur2 === 'RUB' ? '₽' : fromCur2;
        const toLbl2    = toCur2   === 'RUB' ? '₽' : toCur2;
        amtClass   = 'tx-transfer';
        const sameCur2 = fromCur2 === toCur2;
        amtDisplay = sameCur2
          ? '<div style="color:#fbbf24;font-size:16px;font-weight:700">⇄ ' + fromAmt2.toLocaleString('ru-RU') + ' ' + fromLbl2 + '</div>'
          : '<div style="color:#f87171;font-size:15px;font-weight:700">− ' + fromAmt2.toLocaleString('ru-RU') + ' ' + fromLbl2 + '</div>'
          + '<div style="color:#6ee7b7;font-size:15px;font-weight:700">+ ' + toAmt2.toLocaleString('ru-RU') + ' ' + toLbl2 + '</div>';
        sub = '';
      } else if (isDividend) {
        const divAmt = parseFloat(t.amount) || 0;
        const divCur = t.currency || 'RUB';
        const divLbl = divCur === 'RUB' ? '₽' : divCur;
        amtClass   = '';
        amtDisplay = '<div style="color:#a78bfa;font-size:16px;font-weight:700">− ' + divAmt.toLocaleString('ru-RU') + ' ' + divLbl + '</div>';
        sub = divCur !== 'RUB' ? '<div class="tx-sub">≈ ' + Math.round(toRub(divAmt, divCur)).toLocaleString('ru-RU') + ' ₽</div>' : '';
      } else {
        const sign     = isIn ? '+' : isOut ? '−' : '';
        const currency = t.currency || (state.accounts[t.account]||{}).currency || 'RUB';
        const amtFmt   = Math.abs(t.amount||0).toLocaleString('ru-RU');
        const currLabel = currency === 'RUB' ? '₽' : currency;
        const color    = isIn ? '#6ee7b7' : '#f87171';
        amtClass   = isIn ? 'tx-in' : isOut ? 'tx-out' : '';
        amtDisplay = '<div style="color:' + color + ';font-size:16px;font-weight:700">' + sign + ' ' + amtFmt + ' ' + currLabel + '</div>';
        sub = currency !== 'RUB'
          ? '<div class="tx-sub">≈ ' + Math.round(toRub(Math.abs(t.amount||0), currency)).toLocaleString('ru-RU') + ' ₽</div>'
          : '';
      }
      // Emoji by type — matches filter chips
      const typeEmoji = isIn ? '🟢' : isOut ? '🔴' : isTransfer ? '🟡' : isDividend ? '🟣' : '⚪';
      // Emoji bg color
      const icoBg = isIn ? 'rgba(110,231,183,0.13)' : isOut ? 'rgba(239,68,68,0.12)' : isTransfer ? 'rgba(251,191,36,0.13)' : isDividend ? 'rgba(167,139,250,0.14)' : 'rgba(255,255,255,0.06)';
      // Category name (bold top line)
      const catName = t.category || (isIn?'Доход':isOut?'Расход':isTransfer?'Перевод':'Операция');
      // Comment (second line, muted) — only if different from category
      const comment = (t.note && t.note !== catName) ? '<div class="tx-comment">' + t.note + '</div>' : '';
      // Account label (third line)
      const fromAcc = state.accounts[t.fromAccount || t.account] || {};
      const toAcc   = state.accounts[t.toAccount] || {};
      const time = t.time ? ' · ' + t.time.slice(0,5) : '';
      const _dateShort = t.date ? (() => { const p=t.date.split('-'); return parseInt(p[2])+' '+['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][parseInt(p[1])-1]; })() : '';
      const _resolveName = function(key) {
        if (!key) return '?';
        const acc = state.accounts[key];
        if (acc) return (acc.icon||'') + (acc.icon?' ':'') + acc.name;
        // fund:KEY format
        if (String(key).startsWith('fund:')) {
          const f = (state.funds||{})[key.slice(5)];
          if (f) return (f.emoji||f.icon||'💰') + ' ' + f.name;
        }
        // raw fund key
        const fund = (state.funds||{})[key];
        if (fund) return (fund.emoji||fund.icon||'💰') + ' ' + fund.name;
        return key;
      };
      const accMeta = isTransfer && t.toAccount
        ? _resolveName(t.fromAccount || t.account) + ' → ' + _resolveName(t.toAccount)
        : (state.accounts[t.account]||{}).name || '';
      let metaLine;
      if (isTransfer && t.toAccount) {
        const fromLabel = _resolveName(t.fromAccount || t.account);
        const toLabel   = _resolveName(t.toAccount);
        const dateLabel2 = t.date ? (() => { const p=t.date.split('-'); return parseInt(p[2])+' '+['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][parseInt(p[1])-1]; })() : '';
        metaLine = '<div class="tx-meta" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'
          + fromLabel
          + '</div>'
          + '<div class="tx-meta" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'
          + '→ ' + toLabel
          + '</div>'
          + '<div class="tx-meta" style="color:#555;margin-top:1px">' + dateLabel2 + time + '</div>';
      } else {
        const _datePart = _dateShort ? '<div class="tx-meta" style="color:#555;margin-top:1px">' + _dateShort + time + '</div>' : '';
        metaLine = '<div class="tx-meta" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%">' + accMeta + '</div>' + _datePart;
      }

      return '<div class="tx-row" data-tx-open="' + (t.id||'') + '" onclick="state.showEditTxModal=null;state.showTxDetail=\''+t.id+'\';render()">'
        + '<div class="tx-ico" style="background:' + icoBg + ';font-size:20px">' + typeEmoji + '</div>'
        + '<div class="tx-info">'
        +   '<div class="tx-cat">' + catName + '</div>'
        +   comment
        +   metaLine
        + '</div>'
        + '<div class="tx-right">'
        +   '<div class="tx-amt ' + amtClass + '">' + amtDisplay + '</div>'
        +   sub
        + '</div>'
        + '</div>';
    }).join('');

    return '<div class="m-sec-title">' + dateLabel(date) + '</div><div class="m-card">' + txRows + '</div>';
  }).join('');

  return '<div class="tab-content">'
    + '<div id="m-tx-filter-bar">' + filterChips + '</div>'
    + '<div id="m-tx-list">' + rows + '</div>'
    + '</div>';
};


// ── Mobile-only variables (not in shared.js) ──
let _mobileLastTab = null;
let _mobileScrollMap = {};
let _mobileFilterScrollMap = {};
let _skipFullRender = false;
let _fastPathUsed = false;

// Add mobile-only state flags
state.showAddMenu = false;
state._mobileFundSheet = false;
state._mobileFundKey = null;
state._mobileFundSheetNoAnim = false;

// Override render() — uses mockup's static DOM, injects content into #content-root
const _origRender = render;
function render() {
  try {
    // Update topbar text (static elements in mockup)
    const nameEl  = document.getElementById('m-proj-name');
    const emojiEl = document.getElementById('m-proj-emoji');
    const periodEl = document.getElementById('btn-period-open');
    if (nameEl) { const n = _projectName||'MyFinanceAI'; nameEl.textContent = n.length > 12 ? n.slice(0,12)+'…' : n; }
    if (emojiEl)  emojiEl.textContent = _projectEmoji || '💼';
    if (periodEl) {
      const am = state.activeMonth || '';
      const [yr, mo] = am ? am.split('-') : ['',''];
      const monthLabel = mo ? MONTHS[parseInt(mo)-1] + ' ' + yr : 'Период';
      const label = state.activePeriod ? activePeriodLabel() : monthLabel;
      periodEl.textContent = '📅 ' + label;
      periodEl.classList.toggle('active', !!state.activePeriod);
    }

    // Update tab active states
    document.querySelectorAll('.tab[data-tab]').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === state.tab);
    });

    // Dynamically render tabbar — same approach as desktop (tabsHtml/_allTabDefs)
    // Uses _settingsDraft for live preview when settings open
    (function() {
      const bar = document.getElementById('mobile-tabbar');
      if (!bar) return;
      const em = (_settingsDraft ? _settingsDraft.enabledModules : state.enabledModules) || {};
      const ALL = [
        ['overview',     '📊', 'Обзор'],
        ['transactions', '💳', 'Операции'],
        ['pnl',          '📂', 'Детализация'],
        ['goals',        '🎯', 'Цели'],
        ['budgets',      '💰', 'Бюджеты'],
        ['spending',     '🛒', 'Траты'],
        ['partners',     '🤝', 'Партнёры'],
      ];
      const optional = ['goals','budgets','spending','partners'];
      // Filter by enabled modules
      const visible = ALL.filter(function(t) {
        return !optional.includes(t[0]) || em[t[0]];
      });
      // Apply tabOrder if set
      const order = (state.tabOrder || []).filter(function(k) {
        return visible.some(function(t) { return t[0] === k; });
      });
      visible.forEach(function(t) { if (!order.includes(t[0])) order.push(t[0]); });
      const sorted = order.map(function(k) { return visible.find(function(t) { return t[0] === k; }); }).filter(Boolean);
      // If active tab got disabled, reset to overview
      if (state.tab && optional.includes(state.tab) && !em[state.tab]) {
        state.tab = 'overview';
      }
      // Render
      bar.innerHTML = sorted.map(function(t) {
        const active = state.tab === t[0];
        return '<button class="tab' + (active ? ' active' : '') + '" data-tab="' + t[0] + '">'
          + '<span class="tab-icon">' + t[1] + '</span>'
          + '<span>' + t[2] + '</span>'
          + '</button>';
      }).join('');
      // If 4 or fewer tabs — stretch to fill full width; otherwise scroll
      const tabEls = bar.querySelectorAll('.tab');
      if (sorted.length <= 4) {
        bar.style.justifyContent = 'stretch';
        tabEls.forEach(function(el) {
          el.style.setProperty('flex', '1 1 0', 'important');
          el.style.setProperty('min-width', '0', 'important');
        });
      } else {
        bar.style.justifyContent = 'flex-start';
        tabEls.forEach(function(el) {
          el.style.setProperty('flex', '0 0 auto', 'important');
          el.style.setProperty('min-width', 'calc(25vw - 8px)', 'important');
        });
      }
      // Bind tab click handlers
      bar.querySelectorAll('[data-tab]').forEach(function(el) {
        el.onclick = function() { state.tab = el.dataset.tab; render(); };
      });
    })();

    // Render main content into #content-root
    const curTab = state.tab;
    const tabChanged = curTab !== _mobileLastTab;
    const cr = document.getElementById('content-root');

    // FAST PATH: transactions tab — patch only tx list & filter bar, preserve scroll
    if (!tabChanged && curTab === 'transactions') {
      const txListEl    = document.getElementById('m-tx-list');
      const filterBarEl = document.getElementById('m-tx-filter-bar');
      if (txListEl && filterBarEl) {
        try {
          // Save ALL filter row scroll positions
          const scrollSaves = [];
          filterBarEl.querySelectorAll('.m-tx-filters').forEach(function(el) { scrollSaves.push(el.scrollLeft); });
          // Build new HTML in detached div
          const tmp = document.createElement('div');
          tmp.innerHTML = transactionsHtml();
          const newFilter = tmp.querySelector('#m-tx-filter-bar');
          const newList   = tmp.querySelector('#m-tx-list');
          if (newFilter && newList) {
            filterBarEl.innerHTML = newFilter.innerHTML;
            txListEl.innerHTML    = newList.innerHTML;
            // Restore filter scroll positions immediately (not rAF)
            filterBarEl.querySelectorAll('.m-tx-filters').forEach(function(el, i) {
              if (scrollSaves[i] != null) el.scrollLeft = scrollSaves[i];
            });
            // Update stats cards (they depend on activeDir filter)
            var statsEl = document.querySelector('.stats');
            if (statsEl) {
              var tmpStats = document.createElement('div');
              tmpStats.innerHTML = statsHtml();
              var newStats = tmpStats.firstElementChild;
              if (newStats) statsEl.replaceWith(newStats);
            }
            _skipFullRender = true;
            _fastPathUsed = true;
          }
        } catch(fastErr) {
          console.warn('fast path error:', fastErr);
        }
      }
    }

    if (!_skipFullRender) {
      if (cr) cr.innerHTML = statsHtml() + contentHtml();
      if (tabChanged) {
        _mobileLastTab = curTab;
        const tc = document.querySelector('.tab-content');
        if (tc) { tc.classList.add('do-anim'); setTimeout(function(){ const t2=document.querySelector('.tab-content'); if(t2) t2.classList.remove('do-anim'); }, 220); }
      }
    }
    _skipFullRender = false;

    // Render modals into a fixed overlay container on body
    // Modals rendered into fixed body-level container
    let modalRoot = document.getElementById('modal-root');
    if (!modalRoot) {
      modalRoot = document.createElement('div');
      modalRoot.id = 'modal-root';
      document.body.appendChild(modalRoot);
    }
    // Always fixed, full screen, above everything
    modalRoot.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;pointer-events:none;display:none';

    const modalsHtml =
        (state.showModal           ? modalHtml()                              : '')
      + (state.showModePicker      ? modePickerHtml()                         : '')
      + (state.showAiChat          ? aiChatHtml()                             : '')
      + (state.showRates           ? ratesModalHtml()                         : '')
      + (state.showSettingsModal   ? settingsModalHtml()                      : '')
      + (state.showPeriodModal     ? periodModalHtml()                        : '')
      + (state.showProjectSwitcher ? projectSwitcherHtml()                    : '')
      + (state.showProfileModal    ? profileModalHtml()                       : '')
      + (state.showExportModal     ? exportModalHtml()                        : '')
      + (state.showFundModal       ? fundModalHtml()                          : '')
      + (state.showAddFundModal    ? addFundModalHtml()                       : '')
      + (state.showEditFundModal   ? editFundModalHtml()                      : '')
      + (state.showAccModal        ? accModalHtml()                           : '')
      + (state.showAddAccModal     ? addAccModalHtml()                        : '')
      + (state.showEditAccModal    ? editAccModalHtml()                       : '')
      + (state.showTxDetail        ? txDetailModalHtml(state.showTxDetail)    : '')
      + (state.showEditTxModal     ? editTxModalHtml(state.showEditTxModal)   : '')
      + (state.showMobileAdvFilter ? mobileAdvFilterSheet()                   : '')
      + _mobileAccSheetHtml()
      + _mobileFundSheetHtml()
      + _addMenuHtml();

    if (modalsHtml.trim()) {
      modalRoot.innerHTML = modalsHtml;
      modalRoot.style.pointerEvents = 'all';
      modalRoot.style.display = 'block';
    } else {
      modalRoot.innerHTML = '';
      modalRoot.style.pointerEvents = 'none';
      modalRoot.style.display = 'none';
    }

    // Bottom bar ring state
    const ring = document.getElementById('add-ring');
    if (ring) ring.className = 'bot-add-ring' + (state.showAddMenu ? ' open' : '');

    if (!_fastPathUsed) {
      bindEvents();
      _bindMobileExtra();
      renderCharts();
    } else {
      // Fast path: always re-render modals (add menu, sheets, etc)
      _fastPathUsed = false;
      const modalsHtmlFP =
          (state.showModal           ? modalHtml()                              : '')
        + (state.showModePicker      ? modePickerHtml()                         : '')
        + (state.showAiChat          ? aiChatHtml()                             : '')
        + (state.showRates           ? ratesModalHtml()                         : '')
        + (state.showSettingsModal   ? settingsModalHtml()                      : '')
        + (state.showPeriodModal     ? periodModalHtml()                        : '')
        + (state.showProjectSwitcher ? projectSwitcherHtml()                    : '')
        + (state.showProfileModal    ? profileModalHtml()                       : '')
        + (state.showExportModal     ? exportModalHtml()                        : '')
        + (state.showFundModal       ? fundModalHtml()                          : '')
        + (state.showAddFundModal    ? addFundModalHtml()                       : '')
        + (state.showEditFundModal   ? editFundModalHtml()                      : '')
        + (state.showAccModal        ? accModalHtml()                           : '')
        + (state.showAddAccModal     ? addAccModalHtml()                        : '')
        + (state.showEditAccModal    ? editAccModalHtml()                       : '')
        + (state.showTxDetail        ? txDetailModalHtml(state.showTxDetail)    : '')
        + (state.showEditTxModal     ? editTxModalHtml(state.showEditTxModal)   : '')
        + (state.showMobileAdvFilter ? mobileAdvFilterSheet()                   : '')
        + _mobileAccSheetHtml()
        + _mobileFundSheetHtml()
        + _addMenuHtml();
      const mrFP = document.getElementById('modal-root');
      if (mrFP) {
        if (modalsHtmlFP.trim()) { mrFP.innerHTML = modalsHtmlFP; mrFP.style.pointerEvents = 'all'; mrFP.style.display = 'block'; }
        else { mrFP.innerHTML = ''; mrFP.style.pointerEvents = 'none'; mrFP.style.display = 'none'; }
      }
      bindEvents();
      _bindMobileExtra();
    }
  } catch(e) {
    console.error('RENDER ERROR:', e);
    const cr = document.getElementById('content-root');
    if (cr) cr.innerHTML = '<div style="color:#f87171;padding:20px;font-size:13px;font-family:monospace">Ошибка: ' + e.message + '<br>' + e.stack + '</div>';
  }
}

function _ratesHtml() {
  const upd = state.rates.updatedAt
    ? new Date(state.rates.updatedAt).toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit'}) : '';
  return '<div class="rates-strip">'
    + '<div class="rate-chip">SAR = <strong>' + (state.rates.SAR||0).toFixed(2) + ' ₽</strong></div>'
    + '<div class="rate-chip">USDT = <strong class="usdt">' + (state.rates.USDT||0).toFixed(2) + ' ₽</strong></div>'
    + '<div class="rate-chip">USD = <strong style="color:#60a5fa">' + (state.rates.USD||0).toFixed(2) + ' ₽</strong></div>'
    + (upd ? '<div class="rate-chip" style="color:#555;font-size:11px">' + upd + '</div>' : '')
    + '</div>';
}

function statsHtml() {
  // Identical logic to desktop — filter by tab + activeDir + activeAccount
  const tab = state.tab || 'overview';
  let bal, txIn, txOut;

  if (tab === 'transactions') {
    const accFilter = state.activeDir;
    const acc = state.activeAccount;
    // Check if accFilter is a fund key
    const isFundFilter = accFilter && state.funds && state.funds[accFilter];
    let txs = monthTxs().filter(t => !t.isTransfer && t.type !== 'transfer');
    if (isFundFilter) {
      txs = txs.filter(t => t.fundKey === accFilter);
    } else if (accFilter && accFilter !== 'funds') {
      txs = txs.filter(t => t.account === accFilter);
    }
    if (acc) txs = txs.filter(t => t.account === acc);
    if (acc) {
      const a = state.accounts[acc];
      bal = a ? toRub(a.balance, a.currency) : 0;
    } else if (isFundFilter) {
      const f = state.funds[accFilter];
      bal = f ? toRub(f.balance, f.currency || 'RUB') : 0;
    } else if (accFilter === 'funds') {
      bal = Object.values(state.funds).reduce((s,f) => s + toRub(f.balance, f.currency || 'RUB'), 0);
    } else if (accFilter && accFilter !== 'funds') {
      const a = state.accounts[accFilter];
      bal = a ? toRub(a.balance, a.currency) : 0;
    } else {
      bal = Object.values(state.accounts).reduce((s,a) => s + toRub(a.balance, a.currency), 0);
    }
    txIn  = txs.filter(t => t.type === 'income').reduce((s,t) => s + toRub(t.amount, t.currency), 0);
    txOut = txs.filter(t => t.type === 'expense').reduce((s,t) => s + toRub(t.amount, t.currency), 0);

    txIn  = mtxs.filter(t => t.type === 'income').reduce((s,t) => s + toRub(t.amount, t.currency), 0);
    txOut = mtxs.filter(t => t.type === 'expense').reduce((s,t) => s + toRub(t.amount, t.currency), 0);
    bal   = Object.values(state.accounts).reduce((s,a) => s + toRub(a.balance, a.currency), 0);
  }

  const profit = txIn - txOut;
  return '<div class="stats">'
    + '<div class="stat-card"><div class="stat-card-bg">💼</div><div class="stat-label">Баланс</div>'
    +   '<div class="stat-val" style="color:' + (bal>=0?'#a78bfa':'#f87171') + '">' + fmt(bal) + '</div></div>'
    + '<div class="stat-card"><div class="stat-card-bg">✨</div><div class="stat-label">Прибыль</div>'
    +   '<div class="stat-val" style="color:' + (profit>=0?'#a78bfa':'#f87171') + '">' + fmt(profit) + '</div></div>'
    + '<div class="stat-card"><div class="stat-card-bg">📈</div><div class="stat-label">Доходы</div>'
    +   '<div class="stat-val" style="color:#6ee7b7">' + fmt(txIn) + '</div></div>'
    + '<div class="stat-card"><div class="stat-card-bg">📉</div><div class="stat-label">Расходы</div>'
    +   '<div class="stat-val" style="color:#f87171">' + fmt(txOut) + '</div></div>'
    + '</div>';
}

// ── SWIPE TO CLOSE bottom sheets ──
function _initSwipeClose(containerId, closeFn) {
  const el = document.getElementById(containerId);
  if (!el || el._swipeInited) return;
  el._swipeInited = true;
  let startY = 0, startX = 0, isDragging = false, isScrolling = false;
  const onStart = e => {
    startY = e.touches[0].clientY;
    startX = e.touches[0].clientX;
    isDragging = false;
    isScrolling = false;
    el.style.transition = 'none';
  };
  const onMove = e => {
    const dy = e.touches[0].clientY - startY;
    const dx = e.touches[0].clientX - startX;
    // First move: decide if this is a vertical scroll or a sheet-drag
    if (!isDragging && !isScrolling) {
      if (Math.abs(dy) < 5 && Math.abs(dx) < 5) return; // not moved enough yet
      if (Math.abs(dx) > Math.abs(dy)) { isScrolling = true; return; } // horizontal — ignore
      if (dy < 0) { isScrolling = true; return; } // scrolling UP inside sheet — let it scroll
      isDragging = true; // swiping DOWN from top — drag to close
    }
    if (isScrolling) return;
    if (isDragging && dy > 0) {
      el.style.transform = 'translateY(' + dy + 'px)';
      e.preventDefault();
    }
  };
  const onEnd = e => {
    if (!isDragging) return;
    isDragging = false;
    el.style.transition = 'transform 0.25s ease';
    const dy = e.changedTouches[0].clientY - startY;
    if (dy > 80) { el.style.transform = 'translateY(100%)'; setTimeout(closeFn, 220); }
    else { el.style.transform = ''; }
  };
  el.addEventListener('touchstart', onStart, {passive:true});
  el.addEventListener('touchmove', onMove, {passive:false});
  el.addEventListener('touchend', onEnd, {passive:true});
}

function _renderTabbarOnly() {
  // Lightweight tabbar update — used by settings checkboxes to avoid full render()
  // which would cause animation flash and scroll position reset in the modal
  const bar = document.getElementById('mobile-tabbar');
  if (!bar) return;
  const em = (_settingsDraft ? _settingsDraft.enabledModules : state.enabledModules) || {};
  const ALL = [
    ['overview',     '📊', 'Обзор'],
    ['transactions', '💳', 'Операции'],
    ['pnl',          '📂', 'Детализация'],
    ['goals',        '🎯', 'Цели'],
    ['budgets',      '💰', 'Бюджеты'],
    ['spending',     '🛒', 'Траты'],
    ['partners',     '🤝', 'Партнёры'],
  ];
  const optional = ['goals','budgets','spending','partners'];
  const visible = ALL.filter(function(t) {
    return !optional.includes(t[0]) || em[t[0]];
  });
  const order = (state.tabOrder || []).filter(function(k) {
    return visible.some(function(t) { return t[0] === k; });
  });
  visible.forEach(function(t) { if (!order.includes(t[0])) order.push(t[0]); });
  const sorted = order.map(function(k) { return visible.find(function(t) { return t[0] === k; }); }).filter(Boolean);
  bar.innerHTML = sorted.map(function(t) {
    const active = state.tab === t[0];
    return '<button class="tab' + (active ? ' active' : '') + '" data-tab="' + t[0] + '">'
      + '<span class="tab-icon">' + t[1] + '</span>'
      + '<span>' + t[2] + '</span>'
      + '</button>';
  }).join('');
  if (sorted.length <= 4) {
    bar.style.justifyContent = 'stretch';
    bar.querySelectorAll('.tab').forEach(function(el) { el.style.flex = '1 1 0'; el.style.minWidth = '0'; });
  } else {
    bar.style.justifyContent = 'flex-start';
    bar.querySelectorAll('.tab').forEach(function(el) { el.style.flex = '0 0 auto'; el.style.minWidth = 'calc(25vw - 8px)'; });
  }
  bar.querySelectorAll('[data-tab]').forEach(function(el) {
    el.onclick = function() { state.tab = el.dataset.tab; render(); };
  });
}

          document.body.appendChild(tAccClone);
          el.style.opacity = '0.3';
          if (navigator.vibrate) navigator.vibrate(30);
        }, 350);
      }, { passive: true });
      el.addEventListener('touchmove', e => {
        clearTimeout(tAccLP);
        if (!tAccKey || !tAccClone) return;
        const t = e.touches[0];
        tAccClone.style.left = (t.clientX - tAccClone.offsetWidth / 2) + 'px';
        tAccClone.style.top  = (t.clientY - 24) + 'px';
        document.querySelectorAll('[data-drag-acc]').forEach(b => b.style.outline = '');
        const under = document.elementFromPoint(t.clientX, t.clientY);
        const tgt = under && under.closest('[data-drag-acc]');
        if (tgt && tgt.dataset.dragAcc !== tAccKey) tgt.style.outline = '2px solid #6ee7b7';
      }, { passive: false });
      el.addEventListener('touchend', e => {
        clearTimeout(tAccLP);
        if (!tAccKey) return;
        const t = e.changedTouches[0];
        const under = document.elementFromPoint(t.clientX, t.clientY);
        const tgt = under && under.closest('[data-drag-acc]');
        if (tgt && tgt.dataset.dragAcc && tgt.dataset.dragAcc !== tAccKey) {
          const dragAcc   = state.accounts[tAccKey];
          const targetAcc = state.accounts[tgt.dataset.dragAcc];
          const order = getOrderedAccounts();
          const fi = order.indexOf(tAccKey), ti = order.indexOf(tgt.dataset.dragAcc);
          if (fi >= 0 && ti >= 0) {
            order.splice(fi, 1); order.splice(ti, 0, tAccKey);
            state.accOrder = order; saveToStorage();
          }
        }
        document.querySelectorAll('[data-drag-acc]').forEach(b => { b.style.outline = ''; b.style.opacity = ''; });
        if (tAccClone) { tAccClone.remove(); tAccClone = null; }
        tAccKey = null; render();
      });
      el.addEventListener('touchcancel', () => {
        clearTimeout(tAccLP);
        document.querySelectorAll('[data-drag-acc]').forEach(b => { b.style.outline = ''; b.style.opacity = ''; });
        if (tAccClone) { tAccClone.remove(); tAccClone = null; }
        tAccKey = null;
      });
    });
  })();

  // ── Touch drag-to-reorder: Funds ──
  (function() {
    let tFundKey = null, tFundClone = null, tFundLP = null;
    document.querySelectorAll('[data-drag-fund]').forEach(el => {
      el.addEventListener('touchstart', e => {
        if (e.touches.length !== 1) return;
        const touch = e.touches[0];
        tFundLP = setTimeout(() => {
          tFundKey = el.dataset.dragFund;
          tFundClone = el.cloneNode(true);
          const r = el.getBoundingClientRect();
          tFundClone.style.cssText = 'position:fixed;z-index:9999;opacity:0.88;pointer-events:none;border-radius:14px;background:#1a1a2e;border:2px solid #6ee7b7;transition:none;box-shadow:0 8px 32px rgba(0,0,0,0.6);width:' + r.width + 'px;height:' + r.height + 'px;overflow:hidden';
          tFundClone.style.top  = r.top  + 'px';
          tFundClone.style.left = r.left + 'px';
          document.body.appendChild(tFundClone);
          el.style.opacity = '0.3';
          if (navigator.vibrate) navigator.vibrate(30);
        }, 350);
      }, { passive: true });
      el.addEventListener('touchmove', e => {
        clearTimeout(tFundLP);
        if (!tFundKey || !tFundClone) return;
        const t = e.touches[0];
        tFundClone.style.left = (t.clientX - tFundClone.offsetWidth / 2) + 'px';
        tFundClone.style.top  = (t.clientY - 40) + 'px';
        document.querySelectorAll('[data-drag-fund]').forEach(b => b.style.outline = '');
        const under = document.elementFromPoint(t.clientX, t.clientY);
        const tgt = under && under.closest('[data-drag-fund]');
        if (tgt && tgt.dataset.dragFund !== tFundKey) tgt.style.outline = '2px solid #6ee7b7';
      }, { passive: false });
      el.addEventListener('touchend', e => {
        clearTimeout(tFundLP);
        if (!tFundKey) return;
        const t = e.changedTouches[0];
        const under = document.elementFromPoint(t.clientX, t.clientY);
        const tgt = under && under.closest('[data-drag-fund]');
        if (tgt && tgt.dataset.dragFund && tgt.dataset.dragFund !== tFundKey) {
          const order = getOrderedFunds();
          const fi = order.indexOf(tFundKey), ti = order.indexOf(tgt.dataset.dragFund);
          if (fi >= 0 && ti >= 0) {
            order.splice(fi, 1); order.splice(ti, 0, tFundKey);
            state.fundOrder = order; saveToStorage();
          }
        }
        document.querySelectorAll('[data-drag-fund]').forEach(b => { b.style.outline = ''; b.style.opacity = ''; });
        if (tFundClone) { tFundClone.remove(); tFundClone = null; }
        tFundKey = null; render();
      });
      el.addEventListener('touchcancel', () => {
        clearTimeout(tFundLP);
        document.querySelectorAll('[data-drag-fund]').forEach(b => { b.style.outline = ''; b.style.opacity = ''; });
        if (tFundClone) { tFundClone.remove(); tFundClone = null; }
        tFundKey = null;
      });
    });
  })();
}

// ПРАВКА 3: Минималистичный мобильный дизайн счетов
function accountsHtml() {
  const accs = getOrderedAccounts().map(k => [k, state.accounts[k]]);
  const total = accs.reduce((s,[,a]) => s + toRub(a.balance, a.currency), 0);

  function fmtAmt(balance, currency) {
    const sign = balance < 0 ? '-' : '';
    const absVal = Math.abs(balance);
    const hasDecimals = (absVal % 1) !== 0;
    const abs = absVal.toLocaleString('ru-RU', { minimumFractionDigits: hasDecimals ? 2 : 0, maximumFractionDigits: 2 });
    return sign + abs + ' ' + (currency || 'RUB');
  }

  const rows = accs.map(([k,a]) => {
    const color = a.color || '#a78bfa';
    const balFmt = fmtAmt(a.balance, a.currency);
    const rubEquiv = a.currency !== 'RUB'
      ? '<div style="font-size:11px;color:#555;margin-top:2px;font-weight:400">≈ ' + fmtAmt(toRub(a.balance, a.currency), 'RUB') + '</div>'
      : '';
    return '<div data-acc="' + k + '" style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer;-webkit-tap-highlight-color:rgba(255,255,255,0.06)">'
      + '<div style="width:10px;height:10px;border-radius:50%;background:' + color + ';flex-shrink:0"></div>'
      + '<div style="flex:1;min-width:0">'
      +   '<div style="font-size:13px;color:#ddd;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + a.name + '</div>'
      +   '<div style="font-size:11px;color:#555;margin-top:2px">' + a.currency + '</div>'
      + '</div>'
      + '<div style="text-align:right;flex-shrink:0;min-width:90px">'
      +   '<div style="font-size:14px;font-weight:700;font-family:monospace;color:' + color + '">' + balFmt + '</div>'
      +   rubEquiv
      + '</div>'
      + '<div style="color:#444;font-size:14px;flex-shrink:0;margin-left:4px">›</div>'
      + '</div>';
  }).join('');

  const totalFmt = Math.abs(Math.round(total)).toLocaleString('ru-RU') + ' RUB';

  return '<div class="m-card" style="margin-bottom:12px">'
    + '<div class="m-card-header">'
    +   '<div style="display:flex;align-items:center;gap:8px">'
    +     '<span class="m-card-title">Все счета</span>'
    +     '<button id="btn-add-acc" style="padding:3px 9px;border-radius:7px;border:1px solid rgba(167,139,250,0.3);background:rgba(167,139,250,0.07);color:#a78bfa;cursor:pointer;font-size:11px;font-family:inherit;font-weight:600">+ Добавить</button>'
    +   '</div>'
    +   '<span style="font-size:12px;color:#777">Итого: <strong style="color:#a78bfa;font-family:monospace">' + totalFmt + '</strong></span>'
    + '</div>'
    + rows
    + '</div>'
    ;
}

// Mobile funds overview — same design as accounts
function fundsOverviewHtml() {
  const totalFunds = Object.values(state.funds).reduce((s,f) => s + toRub(f.balance, f.currency||'RUB'), 0);

  const rows = getOrderedFunds().map(k => {
    const f = state.funds[k];
    const color = f.color || '#6ee7b7';
    const currency = f.currency || 'RUB';
    const balFmt = Math.round(f.balance).toLocaleString('ru-RU') + ' ' + currency;
    const rubEquiv = currency !== 'RUB'
      ? '<div style="font-size:10px;color:#555;margin-top:2px">≈ ' + Math.round(toRub(f.balance, currency)).toLocaleString('ru-RU') + ' RUB</div>'
      : '';
    return '<div data-mobile-fund="' + k + '" style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid rgba(255,255,255,0.04);cursor:pointer">'
      + '<div style="width:10px;height:10px;border-radius:50%;background:' + color + ';flex-shrink:0"></div>'
      + '<div style="flex:1;min-width:0">'
      +   '<div style="font-size:13px;color:#ddd;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + (f.icon||'') + ' ' + f.name + '</div>'
      +   '<div style="font-size:10px;color:#555;margin-top:2px">' + currency + '</div>'
      + '</div>'
      + '<div style="text-align:right;flex-shrink:0;min-width:90px">'
      +   '<div style="font-size:14px;font-weight:700;font-family:monospace;color:' + color + '">' + balFmt + '</div>'
      +   rubEquiv
      + '</div>'
      + '<div style="color:#444;font-size:14px;flex-shrink:0;margin-left:4px">›</div>'
      + '</div>';
  }).join('');

  return '<div class="m-card" style="margin-bottom:12px">'
    + '<div class="m-card-header">'
    +   '<div style="display:flex;align-items:center;gap:8px">'
    +     '<span class="m-card-title">Фонды</span>'
    +     '<button id="btn-add-fund" style="padding:3px 9px;border-radius:7px;border:1px solid rgba(167,139,250,0.3);background:rgba(167,139,250,0.07);color:#a78bfa;cursor:pointer;font-size:11px;font-family:inherit;font-weight:600">+ Добавить</button>'
    +   '</div>'
    +   '<span style="font-size:12px;color:#777">Итого: <strong style="color:#a78bfa;font-family:monospace">' + Math.round(totalFunds).toLocaleString('ru-RU') + ' RUB</strong></span>'
    + '</div>'
    + rows
    + '</div>';
}


// ── App startup ──────────────────────────────────
(async () => {
  try {
    console.log('[init] step 1: initAuth');
    const authed = await initAuth();
    if (!authed) return;

    console.log('[init] step 2: cloudLoad');
    let saved = null;
    try {
      saved = await Promise.race([
        cloudLoad(),
        new Promise((_,reject) => setTimeout(() => reject(new Error('cloudLoad timeout 10s')), 10000))
      ]);
    } catch(e) {
      console.error('[init] cloudLoad error:', e);
      _appRoot().innerHTML = '<div style="color:orange;padding:40px;font-family:monospace">cloudLoad ошибка: ' + e.message + '</div>';
      return;
    }

    if (saved) {
      Object.assign(state, {
        transactions:    saved.transactions    || [],
        accounts:        saved.accounts        || {},
        funds:           saved.funds           || {},
        fundHistory:     saved.fundHistory     || [],
        directions:      saved.directions      || {},
        dirCategories:   saved.dirCategories   || {},
        partnerPayments: saved.partnerPayments || {},
        enabledModules:  saved.enabledModules  || state.enabledModules,
        rates:           saved.rates           || state.rates,
        enabledCurrencies: saved.enabledCurrencies || ['RUB','USD'],
        theme:           saved.theme           || 'dark',
        lang:            saved.lang            || 'ru',
        dirOrder:        saved.dirOrder        || null,
        accOrder:        saved.accOrder        || null,
        fundOrder:       saved.fundOrder       || null,
        tabOrder:        saved.tabOrder        || null,
      });
      DIRECTIONS = state.directions;
    } else {
      console.warn('cloudLoad returned empty — running preloadIfEmpty');
      preloadIfEmpty();
    }

    state.form = defaultForm();
    applyTheme();
    window._appReady = true; // ← cloudLoad done, saving is now safe

    render();

    // Fetch live rates AFTER render — never before cloudLoad finishes
    fetchLiveRates().then(() => render());

  } catch(err) {
    console.error('[init] fatal error:', err);
    _appRoot().innerHTML = '<div style="color:red;padding:40px;font-family:monospace">ОШИБКА ИНИЦИАЛИЗАЦИИ:<br>' + err.message + '<br><br>' + err.stack + '</div>';
  }
})();
