[build]
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# /dashboard → JS-роутер, который сам определяет устройство
[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/auth-mockup.html"
  status = 200

[[redirects]]
  from = "/onboarding"
  to = "/onboarding.html"
  status = 200

[[redirects]]
  from = "/reset"
  to = "/reset-password.html"
  status = 200

[[redirects]]
  from = "/"
  to = "/auth-mockup.html"
  status = 200
