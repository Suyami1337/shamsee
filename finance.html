  if (aiConfirmBtn) aiConfirmBtn.onclick = () => {
    if (state.aiPendingTxs.length === 0) return;
    const txsToSave = [...state.aiPendingTxs]; // snapshot before clearing
    let added = 0;
    const errors = [];
    txsToSave.forEach((tx, i) => {
      // Unique id: timestamp + index + random to avoid collisions
      // i=0 is first/newest → gets highest createdAt so it sorts to top
      const uid = (Date.now() + (txsToSave.length - i)).toString() + '_' + Math.random().toString(36).slice(2,7);
      try {
        if (tx.type === 'transfer') {
          const fromAcc = state.accounts[tx.fromAccount];
          const toAcc   = state.accounts[tx.toAccount];
          if (!fromAcc) { errors.push(`#${i+1}: счёт "${tx.fromAccount}" не найден`); return; }
          if (!toAcc)   { errors.push(`#${i+1}: счёт "${tx.toAccount}" не найден`); return; }
          const fromAmt = parseFloat(tx.fromAmount || tx.amount) || 0;
          const toAmt   = parseFloat(tx.toAmount   || tx.amount) || 0;
          fromAcc.balance -= fromAmt;
          toAcc.balance   += toAmt;
          state.transactions.push({
            ...tx,
            id: 'tr_' + uid,
            createdAt: Date.now() + (txsToSave.length - i),
            isTransfer: true,
            fromAmount: fromAmt,
            toAmount: toAmt,
            fromCurrency: tx.fromCurrency || fromAcc.currency || 'RUB',
            toCurrency:   tx.toCurrency   || toAcc.currency   || 'RUB',
          });
          added++;
        } else if (tx.type === 'income' || tx.type === 'expense') {
          const acc = state.accounts[tx.account];
          if (!acc) { errors.push(`#${i+1}: счёт "${tx.account}" не найден`); return; }
          const amt = parseFloat(tx.amount) || 0;
          if (amt <= 0) { errors.push(`#${i+1}: некорректная сумма`); return; }
          if (tx.type === 'income')  acc.balance += amt;
          if (tx.type === 'expense') acc.balance -= amt;
          state.transactions.push({
            ...tx,
            id: uid,
            createdAt: Date.now() + (txsToSave.length - i),
            amount: amt,
            currency: tx.currency || acc.currency || 'RUB',
          });
          added++;
        } else {
          errors.push(`#${i+1}: неизвестный тип "${tx.type}"`);
        }
      } catch(err) {
        errors.push(`#${i+1}: ${err.message}`);
      }
    });

    if (added > 0) {
      saveToStorage(); // triggers cloudSave via debounce
    }

    state.aiPendingTxs = [];
    const msg = added > 0
      ? `✅ Сохранено ${added} операций!` + (errors.length ? `\n⚠️ Пропущено: ${errors.join('; ')}` : '')
      : `⚠️ Ничего не сохранено. Ошибки:\n${errors.join('\n')}`;
    state.aiMessages.push({ role: 'assistant', text: msg });
    try { const ms = state.aiMessages.map(m=>({...m,image:m.image?'[img]':null})); sessionStorage.setItem('ai_chat_history', JSON.stringify({messages:ms,ts:Date.now(),projectId:_projectId})); } catch(e) {}
    render();
    scrollAiToBottom();
  };
  if (aiDiscardBtn) aiDiscardBtn.onclick = () => { state.aiPendingTxs = []; render(); };

  // ── AI inline edit buttons ──
  document.querySelectorAll('[data-ai-edit]').forEach(btn => {
    if (btn.dataset.aiEditSave !== undefined) return;
    btn.onclick = () => { state.aiEditingIdx = parseInt(btn.dataset.aiEdit); render(); scrollAiToBottom(); };
  });
  document.querySelectorAll('[data-ai-edit-cancel]').forEach(btn => {
    btn.onclick = (e) => {
      // Only close if clicking the bg overlay, not the inner modal card
      if (btn.id === 'ai-edit-modal-bg' || btn.hasAttribute('data-ai-edit-cancel')) {
        if (e.target !== btn && !btn.id) return; // inner content clicked — ignore
      }
      const msgs = document.getElementById('ai-chat-messages');
      const scrollPos = msgs ? msgs.scrollTop : null;
      state.aiEditingIdx = null;
      render();
      if (scrollPos !== null) { const el = document.getElementById('ai-chat-messages'); if (el) el.scrollTop = scrollPos; }
    };
  });
  // Stop clicks on the inner modal card from closing the bg
  const aiEditInner = document.querySelector('#ai-edit-modal-bg > div');
  if (aiEditInner) aiEditInner.onclick = (e) => e.stopPropagation();
  document.querySelectorAll('[data-ai-edit-save]').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.aiEditSave);
      const tx = state.aiPendingTxs[idx];
      if (!tx) { state.aiEditingIdx = null; render(); return; }
      const g = id => { const el = document.getElementById(id); return el ? el.value : undefined; };
      const type     = g('aie-type')     || tx.type;
      const date     = g('aie-date')     || tx.date;
      const category = g('aie-category') || tx.category;
      const note     = g('aie-note') !== undefined ? g('aie-note') : (tx.note||'');
      let updated;
      if (type === 'transfer') {
        const fromAccount = g('aie-from-account') || tx.fromAccount || tx.account;
        const toAccount   = g('aie-to-account')   || tx.toAccount;
        const fromAmount  = parseFloat(g('aie-from-amount')) || tx.fromAmount || tx.amount;
        const toAmount    = parseFloat(g('aie-to-amount'))   || tx.toAmount   || fromAmount;
        const fromAcc = state.accounts[fromAccount];
        const toAcc   = state.accounts[toAccount];
        updated = { ...tx, type, date, category, note,
          fromAccount, toAccount, fromAmount, toAmount,
          fromCurrency: fromAcc ? fromAcc.currency : (tx.fromCurrency||'RUB'),
          toCurrency:   toAcc   ? toAcc.currency   : (tx.toCurrency||'RUB') };
      } else {
        const account  = g('aie-account')  || tx.account;
        const amount   = parseFloat(g('aie-amount')) || tx.amount;
        const currency = g('aie-currency') || tx.currency;
        const acc = state.accounts[account];
        updated = { ...tx, type, date, account, amount, currency, category, note,
          direction: acc ? acc.direction : tx.direction };
      }
      state.aiPendingTxs[idx] = updated;
      const msgs2 = document.getElementById('ai-chat-messages');
      const scrollPos2 = msgs2 ? msgs2.scrollTop : null;
      state.aiEditingIdx = null;
      render();
      if (scrollPos2 !== null) { const el2 = document.getElementById('ai-chat-messages'); if (el2) el2.scrollTop = scrollPos2; }
    };
  });
  document.querySelectorAll('[data-ai-remove]').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.dataset.aiRemove);
      state.aiPendingTxs.splice(idx, 1);
      if (state.aiEditingIdx === idx) state.aiEditingIdx = null;
      render();
    };
  });

  // ── Fix AI chat scroll: prevent bg scroll, allow messages scroll ──
  const aiMessages = document.getElementById('ai-chat-messages');
  if (aiMessages) {
    aiMessages.addEventListener('wheel', (e) => { e.stopPropagation(); }, { passive: true });
    aiMessages.addEventListener('touchmove', (e) => { e.stopPropagation(); }, { passive: true });
  }

  // ── Restore voice button visual state after re-render ──
  if (_voiceActive) {
    const vBtn = document.getElementById('ai-voice-btn');
    if (vBtn) {
      vBtn.textContent = '⏹';
      vBtn.style.background = 'rgba(239,68,68,0.25)';
      vBtn.style.borderColor = 'rgba(239,68,68,0.5)';
      vBtn.style.color = '#f87171';
    }
  }
}

// ─── CHARTS (Canvas) ───────────────────────────────────────────────────────
function renderCharts() {
  const md = monthlyData();
  if (md.length === 0) return;

  // Bar chart - overview
  const barCanvas = document.getElementById('chart-bar');
  if (barCanvas) drawBarChart(barCanvas, md);

  // Line chart - analytics
  const lineCanvas = document.getElementById('chart-line');
  if (lineCanvas) drawLineChart(lineCanvas, md);

  // Adam area
  const adamCanvas = document.getElementById('chart-adam');
  if (adamCanvas) drawAreaChart(adamCanvas, md, 'adam', '#93c5fd');

  // Shamsee area
  const shamseeCanvas = document.getElementById('chart-shamsee');
  if (shamseeCanvas) drawAreaChart(shamseeCanvas, md, 'shamsee', '#fbbf24');
}

function drawBarChart(canvas, md) {
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 600;
  const H = 220;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0,0,W,H);

  const pad = { l:50, r:20, t:20, b:40 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  const maxVal = Math.max(...md.map(m =>
    Math.max(m.adam_in+m.shamsee_in+m.personal_in, m.adam_out+m.shamsee_out+m.personal_out)
  )) * 1.15 || 1;

  const bw = Math.max(8, (cw / md.length) * 0.35);
  const gap = (cw / md.length);

  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + ch - (ch * i / 4);
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W-pad.r, y); ctx.stroke();
    ctx.fillStyle = '#555'; ctx.font = '11px monospace'; ctx.textAlign = 'right';
    ctx.fillText(fmtShort(maxVal * i / 4), pad.l - 6, y + 4);
  }

  md.forEach((m, i) => {
    const x = pad.l + i * gap + gap/2;
    const inVal  = m.adam_in + m.shamsee_in + m.personal_in;
    const outVal = m.adam_out + m.shamsee_out + m.personal_out;

    // income bar
    const inH = (inVal / maxVal) * ch;
    ctx.fillStyle = '#6ee7b7';
    ctx.fillRect(x - bw - 2, pad.t + ch - inH, bw, inH);

    // expense bar
    const outH = (outVal / maxVal) * ch;
    ctx.fillStyle = '#f87171';
    ctx.fillRect(x + 2, pad.t + ch - outH, bw, outH);

    // label
    ctx.fillStyle = '#666'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(m.label, x, H - 8);
  });
}

function drawLineChart(canvas, md) {
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 600;
  const H = 220;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0,0,W,H);

  const pad = { l:55, r:20, t:20, b:40 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  const nets = md.map(m => (m.adam_in+m.shamsee_in+m.personal_in) - (m.adam_out+m.shamsee_out+m.personal_out));
  const maxV = Math.max(...nets.map(Math.abs)) * 1.2 || 1;

  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + i * ch/4;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W-pad.r, y); ctx.stroke();
    const v = maxV - maxV * 2 * (i/4);
    ctx.fillStyle = '#555'; ctx.font = '11px monospace'; ctx.textAlign = 'right';
    ctx.fillText(fmtShort(v), pad.l-6, y+4);
  }
  // zero line
  const zy = pad.t + ch/2;
  ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(pad.l, zy); ctx.lineTo(W-pad.r, zy); ctx.stroke();

  // line
  ctx.beginPath();
  ctx.strokeStyle = '#a78bfa'; ctx.lineWidth = 2.5;
  nets.forEach((v, i) => {
    const x = pad.l + (i / (nets.length - 1 || 1)) * cw;
    const y = pad.t + (ch/2) - (v / maxV) * (ch/2);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // dots + labels
  nets.forEach((v, i) => {
    const x = pad.l + (i / (nets.length - 1 || 1)) * cw;
    const y = pad.t + (ch/2) - (v / maxV) * (ch/2);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI*2);
    ctx.fillStyle = '#a78bfa'; ctx.fill();
    ctx.fillStyle = '#666'; ctx.font = '11px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(md[i].label, x, H-8);
  });
}

function drawAreaChart(canvas, md, dir, color) {
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 400;
  const H = 200;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0,0,W,H);

  const pad = { l:50, r:15, t:15, b:35 };
  const cw = W - pad.l - pad.r;
  const ch = H - pad.t - pad.b;

  const ins  = md.map(m => m[dir+'_in']);
  const outs = md.map(m => m[dir+'_out']);
  const maxV = Math.max(...ins, ...outs) * 1.2 || 1;
  const n = md.length;

  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 1;
  for (let i = 0; i <= 3; i++) {
    const y = pad.t + i * ch/3;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W-pad.r, y); ctx.stroke();
    ctx.fillStyle = '#555'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
    ctx.fillText(fmtShort(maxV * (1 - i/3)), pad.l-4, y+4);
  }

  function drawArea(vals, clr, alpha) {
    const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t+ch);
    grad.addColorStop(0, clr.replace(')', `,${alpha})`).replace('rgb', 'rgba'));
    grad.addColorStop(1, clr.replace(')', ',0)').replace('rgb', 'rgba'));
    ctx.beginPath();
    vals.forEach((v, i) => {
      const x = pad.l + (i / (n-1||1)) * cw;
      const y = pad.t + ch - (v / maxV) * ch;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    const lastX = pad.l + cw;
    ctx.lineTo(lastX, pad.t+ch); ctx.lineTo(pad.l, pad.t+ch); ctx.closePath();
    ctx.fillStyle = grad; ctx.fill();
    ctx.beginPath();
    vals.forEach((v, i) => {
      const x = pad.l + (i / (n-1||1)) * cw;
      const y = pad.t + ch - (v / maxV) * ch;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = clr; ctx.lineWidth = 2; ctx.stroke();
  }

  // convert hex to rgb for gradient
  function hexToRgb(hex) { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgb(${r},${g},${b})`; }
  drawArea(ins,  hexToRgb(color),   0.3);
  drawArea(outs, 'rgb(239,68,68)',  0.2);

  ins.forEach((_, i) => {
    ctx.fillStyle = '#555'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(md[i].label, pad.l + (i/(n-1||1))*cw, H-5);
  });
}

function drawPieChart(canvas) {
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth || 200;
  const H = 200;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0,0,W,H);

  const data = Object.entries(DIRECTIONS).map(([k,v]) => {
    const s = dirStats(k);
    return { name: v.label, value: Math.max(s.income, 0), color: v.color };
  }).filter(d => d.value > 0);

  if (data.length === 0) {
    ctx.fillStyle = '#333'; ctx.font = '13px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Нет данных', W/2, H/2);
    return;
  }

  const total = data.reduce((s,d) => s+d.value, 0);
  const cx = W/2, cy = H/2, r = Math.min(W,H)/2 - 20;
  let angle = -Math.PI/2;

  data.forEach(d => {
    const slice = (d.value / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, angle, angle+slice);
    ctx.closePath();
    ctx.fillStyle = d.color; ctx.fill();

    // label
    const mid = angle + slice/2;
    const lx = cx + Math.cos(mid) * (r*0.65);
    const ly = cy + Math.sin(mid) * (r*0.65);
    ctx.fillStyle = '#000'; ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(Math.round(d.value/total*100)+'%', lx, ly+4);

    angle += slice;
  });

  // inner circle
  ctx.beginPath(); ctx.arc(cx, cy, r*0.45, 0, Math.PI*2);
  ctx.fillStyle = '#0d0d0d'; ctx.fill();

  // legend
  const legend = document.getElementById('pie-legend');
  if (legend) {
    legend.innerHTML = data.map(d => `
      <div class="pie-leg-item">
        <div class="pie-dot" style="background:${d.color}"></div>
        ${d.name}
      </div>`).join('');
  }
}

function fmtShort(n) {
  if (Math.abs(n) >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (Math.abs(n) >= 1000) return (n/1000).toFixed(0) + 'k';
  return Math.round(n).toString();
}

// ─── PRELOAD DATA ──────────────────────────────────────────────────────────
function preloadIfEmpty() {
  // New project defaults — set minimal clean state
  state.directions = { personal: { label: 'Личные финансы', color: '#6ee7b7', icon: '👤', partners: [] } };
  state.accounts = {
    personal_card: { name: '💳 Личная карта', direction: 'personal', currency: 'RUB', balance: 0 },
    personal_cash: { name: '💵 Наличные', direction: 'personal', currency: 'RUB', balance: 0 },
  };
  state.funds = {
    cushion: { name: 'Подушка безопасности', balance: 0, currency: 'RUB', icon: '🛡️', color: '#6ee7b7' },
    savings: { name: 'Накопительный счёт', balance: 0, currency: 'RUB', icon: '💰', color: '#93c5fd' },
  };
  state.enabledCurrencies = ['RUB', 'USD'];
  state.rates = { SAR: 20.5, USDT: 77, USD: 90 };

}

// ─── INIT ──────────────────────────────────────────────────────────────────
function applyTheme() {
  // Theme switching disabled - dark theme only
  document.body.classList.remove('light');
}

// ── Init with cloud ──────────────────────────────
(async () => {
  try {
  document.getElementById('app').innerHTML = '<div style="color:#888;padding:40px;font-family:monospace">Шаг 1: initAuth...</div>';
  const authed = await initAuth();
  if (!authed) return;
  document.getElementById('app').innerHTML = '<div style="color:#888;padding:40px;font-family:monospace">Шаг 2: cloudLoad...</div>';

  let cloudData = null;
  try {
    cloudData = await Promise.race([
      cloudLoad(),
      new Promise((_,reject) => setTimeout(() => reject(new Error('cloudLoad timeout 10s')), 10000))
    ]);
  } catch(e) {
    document.getElementById('app').innerHTML = '<div style="color:orange;padding:40px;font-family:monospace">cloudLoad ошибка: ' + e.message + '</div>';
    // Continue with empty state anyway
    cloudData = null;
  }

  if (cloudData && Object.keys(cloudData).length > 0) {
    // Restore from cloud — never overwrite existing data with empty values
    const p = cloudData;
    if (Array.isArray(p.transactions))                    state.transactions    = p.transactions;
    if (p.accounts   && Object.keys(p.accounts).length)   state.accounts        = p.accounts;
    if (p.funds      && Object.keys(p.funds).length)      state.funds           = p.funds;
    if (Array.isArray(p.fundHistory))                     state.fundHistory     = p.fundHistory;
    if (p.directions && Object.keys(p.directions).length) state.directions      = p.directions;
    if (p.dirCategories)                                  state.dirCategories   = p.dirCategories;
    if (p.partnerPayments)                                state.partnerPayments = p.partnerPayments;
    if (p.rates      && Object.keys(p.rates).length)      state.rates           = p.rates;
    if (Array.isArray(p.enabledCurrencies) && p.enabledCurrencies.length)
                                                          state.enabledCurrencies = p.enabledCurrencies;
    if (p.theme) state.theme = p.theme;
    if (p.lang)  state.lang  = p.lang;
  } else {
    // Brand new project — seed defaults and immediately save to cloud
    console.warn('cloudLoad returned empty — running preloadIfEmpty');
    preloadIfEmpty();
    cloudSave({
      transactions: state.transactions, accounts: state.accounts, funds: state.funds,
      fundHistory: state.fundHistory, directions: state.directions, dirCategories: state.dirCategories,
      partnerPayments: state.partnerPayments, rates: state.rates,
      enabledCurrencies: state.enabledCurrencies, theme: state.theme, lang: state.lang
    });
  }

  // Always sync DIRECTIONS global after loading
  DIRECTIONS = state.directions;

  // Restore AI chat history (expires after 30 min)
  try {
    const saved = sessionStorage.getItem('ai_chat_history');
    if (saved) {
      const { messages, ts, projectId } = JSON.parse(saved);
      const age = Date.now() - ts;
      if (age < 30 * 60 * 1000 && projectId === _projectId) {
        state.aiMessages = messages;
      } else {
        sessionStorage.removeItem('ai_chat_history');
      }
    }
  } catch(e) {}

  applyTheme();
  document.getElementById('app').innerHTML = '<div style="color:#888;padding:40px;font-family:monospace">Шаг 3: render()...</div>';
  render();

  // ── AI Chat: image upload handler (survives re-renders via delegation) ──
  document.addEventListener('change', function(e) {
    if (e.target.id !== 'ai-img-input') return;
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const dataUrl = ev.target.result;
      const mediaType = dataUrl.split(';')[0].split(':')[1] || 'image/jpeg';
      const base64 = dataUrl.split(',')[1];
      const text = document.getElementById('ai-text-input')?.value.trim() || '';
      document.getElementById('ai-text-input') && (document.getElementById('ai-text-input').value = '');
      sendAiMessage(text || 'Распознай операции на этом скриншоте', base64, mediaType);
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  });

  // ── AI Chat: Enter to send (Shift+Enter = newline) ──
  } catch(initErr) {
    document.getElementById('app').innerHTML = '<div style="color:red;padding:40px;font-family:monospace">ОШИБКА ИНИЦИАЛИЗАЦИИ:<br>' + initErr.message + '<br><br>' + initErr.stack + '</div>';
  }

  // ── Transaction click delegation (open detail, edit, delete) ──
  document.addEventListener('click', function(e) {
    // Partner manage button
    const partnerManageBtn = e.target.closest('[data-partner-manage]');
    if (partnerManageBtn) {
      state.showPartnerManage = partnerManageBtn.dataset.partnerManage;
      render();
      return;
    }
    // Partner manage modal close & bg
    if (e.target.id === 'partner-manage-close') {
      state.showPartnerManage = null; render(); return;
    }
    if (e.target.id === 'partner-manage-bg') {
      state.showPartnerManage = null; render(); return;
    }

    // ── Partner manage modal: Add partner ──
    if (e.target.id === 'btn-pm-add') {
      const dirKey = state.showPartnerManage;
      if (!dirKey) return;
      const dir = state.directions[dirKey] || DIRECTIONS[dirKey];
      if (!dir) return;
      if (!dir.partners) dir.partners = [];
      dir.partners.push({ id: 'p_' + Date.now(), name: '', role: '', share: 0 });
      if (state.directions[dirKey]) state.directions[dirKey] = dir;
      DIRECTIONS[dirKey] = dir;
      render();
      return;
    }

    // ── Partner manage modal: Delete partner ──
    const pmDel = e.target.closest('[data-pm-del]');
    if (pmDel && state.showPartnerManage) {
      const dirKey = state.showPartnerManage;
      const idx = parseInt(pmDel.dataset.pmDel);
      const dir = state.directions[dirKey] || DIRECTIONS[dirKey];
      if (dir && dir.partners) {
        dir.partners.splice(idx, 1);
        DIRECTIONS[dirKey] = dir;
        if (state.directions[dirKey]) state.directions[dirKey] = dir;
      }
      render();
      return;
    }

    // ── Partner manage modal: Save ──
    if (e.target.id === 'btn-pm-save') {
      const dirKey = state.showPartnerManage;
      if (!dirKey) return;
      const dir = state.directions[dirKey] || DIRECTIONS[dirKey];
      if (!dir || !dir.partners) return;
      dir.partners = dir.partners.map((p, i) => {
        const nameEl  = document.querySelector(`[data-pm-name="${i}"]`);
        const roleEl  = document.querySelector(`[data-pm-role="${i}"]`);
        const shareEl = document.querySelector(`[data-pm-share="${i}"]`);
        return {
          ...p,
          name:  nameEl  ? nameEl.value.trim()              : p.name,
          role:  roleEl  ? roleEl.value.trim()              : p.role,
          share: shareEl ? parseFloat(shareEl.value) / 100  : p.share,
        };
      });
      DIRECTIONS[dirKey] = dir;
      if (state.directions[dirKey]) state.directions[dirKey] = dir;
      saveToStorage();
      state.showPartnerManage = null;
      render();
      return;
    }
    // Open detail modal when clicking a tx-item card
    const txCard = e.target.closest('[data-tx-open]');
    if (txCard && !e.target.closest('[data-tx-edit]') && !e.target.closest('[data-tx-del]')) {
      state.showTxDetail = txCard.dataset.txOpen;
      render();
      return;
    }

    // Edit button inside detail modal
    const txEdit = e.target.closest('[data-tx-edit]');
    if (txEdit) {
      state.showTxDetail = null;
      state.showEditTxModal = txEdit.dataset.txEdit;
      render();
      return;
    }

    // Delete button inside detail modal
    const txDel = e.target.closest('[data-tx-del]');
    if (txDel) {
      const txId = txDel.dataset.txDel;
      if (!confirm('Удалить операцию?')) return;
      const tx = state.transactions.find(t => t.id === txId);
      if (tx) {
        // Reverse balance effect
        if (tx.type === 'transfer') {
          const fromAcc = state.accounts[tx.fromAccount];
          const toAcc   = state.accounts[tx.toAccount];
          if (fromAcc) fromAcc.balance += parseFloat(tx.fromAmount || tx.amount) || 0;
          if (toAcc)   toAcc.balance   -= parseFloat(tx.toAmount   || tx.amount) || 0;
        } else {
          const acc = state.accounts[tx.account];
          if (acc) {
            if (tx.type === 'income')  acc.balance -= parseFloat(tx.amount) || 0;
            if (tx.type === 'expense') acc.balance += parseFloat(tx.amount) || 0;
          }
        }
        state.transactions = state.transactions.filter(t => t.id !== txId);
        state.showTxDetail = null;
        saveToStorage();
        render();
      }
      return;
    }

    // Save edited transaction
    if (e.target.id === 'btn-etx-save') {
      const txId = state.showEditTxModal;
      const tx = state.transactions.find(t => t.id === txId);
      if (!tx) return;
      const g = id => { const el = document.getElementById(id); return el ? el.value : undefined; };

      const newType = g('etx-type') || tx.type;
      const newDate = g('etx-date') || tx.date;
      const newNote = g('etx-note') !== undefined ? g('etx-note') : (tx.note || '');
      const newCat  = g('etx-category') || tx.category;

      // Reverse old balance effect
      if (tx.type === 'transfer') {
        const fa = state.accounts[tx.fromAccount];
        const ta = state.accounts[tx.toAccount];
        if (fa) fa.balance += parseFloat(tx.fromAmount || tx.amount) || 0;
        if (ta) ta.balance -= parseFloat(tx.toAmount   || tx.amount) || 0;
      } else {
        const acc = state.accounts[tx.account];
        if (acc) {
          if (tx.type === 'income')  acc.balance -= parseFloat(tx.amount) || 0;
          if (tx.type === 'expense') acc.balance += parseFloat(tx.amount) || 0;
        }
      }

      // Apply new values + new balance effect
      if (newType === 'transfer') {
        const fromKey = g('etx-from-account') || tx.fromAccount || tx.account;
        const toKey   = g('etx-to-account')   || tx.toAccount;
        const fromAmt = parseFloat(g('etx-from-amount')) || parseFloat(tx.fromAmount || tx.amount) || 0;
        const toAmt   = parseFloat(g('etx-to-amount'))   || parseFloat(tx.toAmount   || tx.amount) || fromAmt;
        const fromAcc = state.accounts[fromKey];
        const toAcc   = state.accounts[toKey];
        if (fromAcc) fromAcc.balance -= fromAmt;
        if (toAcc)   toAcc.balance   += toAmt;
        Object.assign(tx, {
          type: 'transfer', date: newDate, note: newNote, category: newCat,
          fromAccount: fromKey, toAccount: toKey,
          fromAmount: fromAmt, toAmount: toAmt,
          fromCurrency: fromAcc ? fromAcc.currency : (tx.fromCurrency || 'RUB'),
          toCurrency:   toAcc   ? toAcc.currency   : (tx.toCurrency   || 'RUB'),
          // clear old single-account fields
          account: undefined, amount: undefined, direction: undefined,
        });
      } else {
        const newDir    = g('etx-direction') || tx.direction;
        const newAccKey = g('etx-account')   || tx.account;
        const newAmt    = parseFloat(g('etx-amount')) || parseFloat(tx.amount) || 0;
        const newCur    = g('etx-currency')  || tx.currency || 'RUB';
        const newAcc    = state.accounts[newAccKey];
        if (newAcc) {
          if (newType === 'income')  newAcc.balance += newAmt;
          if (newType === 'expense') newAcc.balance -= newAmt;
        }
        Object.assign(tx, {
          type: newType, date: newDate, note: newNote, category: newCat,
          direction: newDir, account: newAccKey, amount: newAmt, currency: newCur,
          // clear transfer fields
          fromAccount: undefined, toAccount: undefined,
          fromAmount: undefined, toAmount: undefined,
        });
      }

      state.showEditTxModal = null;
      saveToStorage();
      render();
      return;
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.target.id !== 'ai-text-input') return;
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      const text = e.target.value.trim();
      if (text) { e.target.value = ''; sendAiMessage(text, null); }
    }
  });

  // ── AI textarea auto-height ──
  document.addEventListener('input', function(e) {
    if (e.target.id !== 'ai-text-input') return;
    e.target.style.height = '42px';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  });
})();

// ── Voice input ──────────────────────────────────────────────────────────────
let _voiceRecognition = null;
let _voiceActive = false;

function startVoiceInput() {
  const btn = document.getElementById('ai-voice-btn');

  // If already active — stop
  if (_voiceActive) {
    _voiceRecognition && _voiceRecognition.stop();
    _voiceActive = false;
    if (btn) { btn.textContent = '🎤'; btn.style.background = ''; btn.style.borderColor = ''; }
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    // Fallback: MediaRecorder approach
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      alert('Голосовой ввод не поддерживается в этом браузере. Используй Chrome или Safari.');
      return;
    }
    alert('Голосовой ввод работает только в Chrome. Открой сайт в Chrome для использования этой функции.');
    return;
  }

  _voiceRecognition = new SpeechRecognition();
  _voiceRecognition.lang = 'ru-RU';
  _voiceRecognition.continuous = true;
  _voiceRecognition.interimResults = true;
  _voiceRecognition.maxAlternatives = 1;

  if (btn) {
    btn.textContent = '⏹';
    btn.style.background = 'rgba(239,68,68,0.25)';
    btn.style.borderColor = 'rgba(239,68,68,0.5)';
    btn.style.color = '#f87171';
    btn.title = 'Нажми чтобы остановить';
  }
  _voiceActive = true;

  let finalTranscript = '';

  _voiceRecognition.onresult = function(e) {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalTranscript += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    // Show interim in input field
    const inp = document.getElementById('ai-text-input');
    if (inp) inp.value = finalTranscript + interim;
  };

  _voiceRecognition.onend = function() {
    _voiceActive = false;
    if (btn) { btn.textContent = '🎤'; btn.style.background = ''; btn.style.borderColor = ''; btn.style.color = ''; btn.title = 'Голосовой ввод'; }
    if (finalTranscript.trim()) {
      const inp = document.getElementById('ai-text-input');
      if (inp) inp.value = '';
      sendAiMessage(finalTranscript.trim(), null);
    }
  };

  _voiceRecognition.onerror = function(e) {
    _voiceActive = false;
    if (btn) { btn.textContent = '🎤'; btn.style.background = ''; btn.style.borderColor = ''; btn.style.color = ''; }
    if (e.error === 'not-allowed') {
      alert('Доступ к микрофону запрещён. Разреши доступ в настройках браузера.');
    } else if (e.error === 'no-speech') {
      // just reset silently
    } else {
      console.warn('Voice error:', e.error);
    }
  };

  try {
    _voiceRecognition.start();
  } catch(err) {
    _voiceActive = false;
    if (btn) { btn.textContent = '🎤'; btn.style.background = ''; btn.style.borderColor = ''; btn.style.color = ''; }
    console.warn('Voice start error:', err);
  }
}

function doExportPdf() {
  const dirs  = state.exportDirs  || Object.keys(DIRECTIONS);
  const accs  = state.exportAccs  || Object.keys(state.accounts);
  const from  = state.exportDateFrom ? new Date(state.exportDateFrom) : null;
  const to    = state.exportDateTo   ? new Date(state.exportDateTo)   : null;
  const showBal = state.exportShowBalances !== false;

  let txs = state.transactions.filter(t => {
    if (!dirs.includes(t.direction)) return false;
    if (!accs.includes(t.account))   return false;
    if (from && new Date(t.date) < from) return false;
    if (to   && new Date(t.date) > to)   return false;
    return true;
  }).sort((a,b) => new Date(a.date)-new Date(b.date));

  const MONTHS_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const fmtDate = d => { const p=d.split('-'); return p.length===3?`${parseInt(p[2])} ${MONTHS_GEN[parseInt(p[1])-1]} ${p[0]}`:d; };
  const typeLabel = t => t==='income'?'Доход':t==='expense'?'Расход':'ДДС';
  const typeColor = t => t==='income'?'#16a34a':t==='expense'?'#dc2626':'#d97706';

  const txRows = txs.map(t => {
    const acc = state.accounts[t.account];
    const dir = DIRECTIONS[t.direction];
    const sign = t.type==='income' ? '+' : '-';
    const color = typeColor(t.type);
    return `<tr>
      <td>${fmtDate(t.date)}</td>
      <td style="color:${color};font-weight:600">${typeLabel(t.type)}</td>
      <td>${dir ? dir.label : t.direction}</td>
      <td>${acc ? acc.name : t.account}</td>
      <td>${t.category}</td>
      <td>${t.note || '—'}</td>
      <td style="text-align:right;font-weight:600;color:${color}">${sign}${fmt(t.amount, t.currency)}</td>
      <td style="text-align:right;color:#555">${t.currency !== 'RUB' ? '≈'+fmt(toRub(t.amount,t.currency)) : '—'}</td>
    </tr>`;
  }).join('');

  const balRows = showBal ? accs.map(k => {
    const a = state.accounts[k];
    if (!a) return '';
    const dir = DIRECTIONS[a.direction];
    return `<tr>
      <td>${a.name}</td>
      <td>${dir ? dir.label : a.direction}</td>
      <td>${a.currency}</td>
      <td style="text-align:right;font-weight:600">${fmt(a.balance, a.currency)}</td>
      <td style="text-align:right;color:#555">${a.currency !== 'RUB' ? '≈'+fmt(toRub(a.balance,a.currency)) : '—'}</td>
    </tr>`;
  }).join('') : '';

  const periodStr = from || to
    ? `Период: ${from ? fmtDate(state.exportDateFrom) : '—'} → ${to ? fmtDate(state.exportDateTo) : '—'}`
    : 'Все время';

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>MyFinanceAI — Выписка</title>
  <style>
    body{font-family:Arial,sans-serif;padding:24px;color:#111}
    h1{font-size:20px;margin-bottom:4px}
    .sub{color:#666;font-size:13px;margin-bottom:20px}
    table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:32px}
    th{background:#f3f4f6;text-align:left;padding:8px 10px;border-bottom:2px solid #e5e7eb;font-weight:600}
    td{padding:7px 10px;border-bottom:1px solid #f0f0f0}
    h2{font-size:15px;margin-bottom:8px;color:#374151}
  </style></head><body>
  <h1>📊 Финансовая выписка — MyFinanceAI</h1>
  <div class="sub">${periodStr} · Сформировано: ${new Date().toLocaleDateString('ru')}</div>
  <h2>Операции</h2>
  <table>
    <thead><tr><th>Дата</th><th>Тип</th><th>Направление</th><th>Счёт</th><th>Категория</th><th>Комментарий</th><th>Сумма</th><th>≈RUB</th></tr></thead>
    <tbody>${txRows}</tbody>
  </table>
  ${showBal ? '<h2>Балансы счётов</h2><table><thead><tr><th>Счёт</th><th>Направление</th><th>Валюта</th><th>Баланс</th><th>≈RUB</th></tr></thead><tbody>'+balRows+'</tbody></table>' : ''}
  </body></html>`;

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  setTimeout(() => win.print(), 500);
}
</script>
</body>
</html>
</body>
</html>
