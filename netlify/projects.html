<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мои проекты</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #06060f; color: #f0f0f0; font-family: 'Inter', sans-serif; min-height: 100vh; }

  .bg-mesh { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.12; animation: float 14s ease-in-out infinite; }
  .orb-1 { width: 500px; height: 500px; background: #6ee7b7; top: -150px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: #3b82f6; bottom: -100px; right: -80px; animation-delay: -5s; }
  @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-30px)} }

  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .app { position: relative; z-index: 1; max-width: 780px; margin: 0 auto; padding: 40px 20px 80px; }

  /* Header */
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg,#6ee7b7,#3b82f6); display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-name { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: #fff; }
  .user-chip { display: flex; align-items: center; gap: 8px; padding: 7px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; font-size: 13px; color: #888; cursor: pointer; transition: all 0.15s; }
  .user-chip:hover { background: rgba(255,255,255,0.07); color: #ccc; }

  /* Hero */
  .hero { margin-bottom: 40px; }
  .greeting { font-size: 13px; color: #555; margin-bottom: 8px; }
  .hero-title { font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800; letter-spacing: -0.03em; color: #fff; }
  .hero-sub { font-size: 15px; color: #555; margin-top: 8px; }

  /* Projects grid */
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 16px; }

  .project-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 18px;
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
  }
  .project-card:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.14); transform: translateY(-2px); }
  .project-card::before { content: ''; position: absolute; inset: 0; background: var(--accent-color); opacity: 0.04; pointer-events: none; }

  .project-emoji { font-size: 36px; margin-bottom: 14px; display: block; }
  .project-name { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .project-meta { font-size: 12px; color: #555; }
  .project-arrow { position: absolute; bottom: 20px; right: 20px; color: #333; font-size: 18px; transition: all 0.2s; }
  .project-card:hover .project-arrow { color: #666; transform: translateX(3px); }

  .project-accent-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: var(--accent-color); opacity: 0.6; border-radius: 0 0 18px 18px; }

  /* Add project card */
  .add-card {
    background: transparent;
    border: 1px dashed rgba(255,255,255,0.1);
    border-radius: 18px;
    padding: 24px 20px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 10px; min-height: 160px;
    color: #444;
    animation: fadeUp 0.4s ease 0.2s forwards;
    opacity: 0;
  }
  .add-card:hover { border-color: rgba(110,231,183,0.3); color: #6ee7b7; background: rgba(110,231,183,0.04); }
  .add-card-icon { font-size: 28px; }
  .add-card-text { font-size: 14px; font-weight: 600; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
  .modal { background: rgba(16,16,28,0.98); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 32px; width: 100%; max-width: 440px; }
  .modal-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 6px; }
  .modal-sub { font-size: 14px; color: #555; margin-bottom: 28px; }

  .field { margin-bottom: 18px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .field input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 11px; color: #fff; font-size: 15px; font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: rgba(110,231,183,0.4); }
  .field input::placeholder { color: #333; }

  /* Emoji picker */
  .emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .emoji-opt { width: 42px; height: 42px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .emoji-opt:hover, .emoji-opt.selected { background: rgba(110,231,183,0.15); border-color: rgba(110,231,183,0.4); }

  /* Color picker */
  .color-grid { display: flex; gap: 10px; flex-wrap: wrap; }
  .color-opt { width: 32px; height: 32px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.15s; }
  .color-opt.selected { border-color: #fff; transform: scale(1.15); }

  .btn-row { display: flex; gap: 10px; margin-top: 24px; }
  .btn-cancel { flex: 1; padding: 12px; border-radius: 11px; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: #666; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
  .btn-cancel:hover { background: rgba(255,255,255,0.05); color: #aaa; }
  .btn-create { flex: 2; padding: 12px; border-radius: 11px; border: none; background: linear-gradient(135deg,#6ee7b7,#3b82f6); color: #000; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; transition: opacity 0.15s; }
  .btn-create:hover { opacity: 0.9; }
  .btn-create:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Empty state */
  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-icon { font-size: 56px; margin-bottom: 20px; }
  .empty-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 10px; }
  .empty-sub { font-size: 15px; color: #555; margin-bottom: 32px; line-height: 1.6; }
  .btn-primary { display: inline-block; padding: 14px 32px; background: linear-gradient(135deg,#6ee7b7,#3b82f6); border: none; border-radius: 12px; color: #000; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif; }

  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .proj-settings-btn { position:absolute; top:14px; right:14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); border-radius:8px; font-size:14px; cursor:pointer; padding:4px 7px; line-height:1; z-index:2; opacity:0; transition:all 0.15s; }
  .project-card:hover .proj-settings-btn { opacity:1; }
  .proj-settings-btn:hover { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.2); }

  .loading { text-align: center; padding: 80px; color: #444; font-size: 15px; }
</style>
</head>
<body>
<div class="bg-mesh"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="bg-grid"></div>

<div class="app" id="app">
  <div class="loading">Загрузка...</div>
</div>

<!-- Create project modal -->
<div class="modal-bg" id="create-modal" style="display:none">
  <div class="modal">
    <div class="modal-title">Новый проект</div>
    <div class="modal-sub">Придумай название для своего финансового пространства</div>

    <div class="field">
      <label>Название проекта</label>
      <input type="text" id="proj-name" placeholder="Например: Мой бизнес" maxlength="40">
    </div>

    <div class="field">
      <label>Иконка</label>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>

    <div class="field">
      <label>Цвет</label>
      <div class="color-grid" id="color-grid"></div>
    </div>

    <div class="btn-row">
      <button class="btn-cancel" id="btn-cancel-modal">Отмена</button>
      <button class="btn-create" id="btn-create-proj">Создать проект →</button>
    </div>
  </div>
</div>

<!-- Profile modal -->
<div class="modal-bg" id="profile-modal" style="display:none">
  <div class="modal" style="max-width:420px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px">
      <div class="modal-title" style="margin-bottom:0">👤 Личный кабинет</div>
      <button id="btn-profile-close" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#666;font-size:20px;cursor:pointer;padding:4px 10px;line-height:1">×</button>
    </div>
    <div id="profile-content"></div>
    <button id="btn-change-password" style="width:100%;padding:12px;border-radius:11px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#ccc;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:10px">🔐 Сменить пароль</button>
    <button id="btn-logout-profile" style="width:100%;padding:12px;border-radius:11px;border:1px solid rgba(239,68,68,0.3);background:rgba(239,68,68,0.07);color:#f87171;font-size:14px;font-weight:600;cursor:pointer">Выйти из аккаунта</button>
  </div>
</div>

<!-- Settings modal -->
<div class="modal-bg" id="settings-modal" style="display:none">
  <div class="modal">
    <div class="modal-title">⚙️ Настройки проекта</div>
    <div class="modal-sub">Изменить название, иконку или удалить проект</div>
    <div class="field">
      <label>Название проекта</label>
      <input type="text" id="settings-proj-name" placeholder="Название" maxlength="40">
    </div>
    <div class="field">
      <label>Иконка</label>
      <div class="emoji-grid" id="settings-emoji-grid"></div>
    </div>
    <div class="field">
      <label>Цвет</label>
      <div class="color-grid" id="settings-color-grid"></div>
    </div>
    <div class="btn-row">
      <button class="btn-cancel" id="btn-cancel-settings">Отмена</button>
      <button class="btn-create" id="btn-save-settings">Сохранить</button>
    </div>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06)">
      <button id="btn-delete-proj" style="width:100%;padding:11px;border-radius:11px;border:1px solid rgba(239,68,68,0.25);background:rgba(239,68,68,0.06);color:#f87171;font-size:13px;font-weight:600;cursor:pointer">🗑 Удалить проект</button>
    </div>
  </div>
</div>

<script>
const _SB = supabase.createClient(
  'https://kkaixwmqclsudabgofcf.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYWl4d21xY2xzdWRhYmdvZmNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MDc4ODcsImV4cCI6MjA4ODA4Mzg4N30.zD9M-Tthd_FBdcrXuOukEdxuWnIaR0yWfm0CnWyuhb0'
);

const EMOJIS = ['💼','📊','🏢','🚀','💡','🎯','💰','🌍','🏗️','📱','🎓','🛒','💎','🔥','⚡','🌿'];
const COLORS = ['#6ee7b7','#3b82f6','#a78bfa','#f87171','#fbbf24','#fb923c','#34d399','#e879f9','#38bdf8','#f472b6'];

let _user = null;
let _projects = [];
let _selectedEmoji = '💼';
let _selectedColor = '#6ee7b7';
let _settingsEmoji = '💼';
let _settingsColor = '#6ee7b7';
let _editingProjectId = null;

// ── Init ──────────────────────────────────────────
(async () => {
  const { data } = await _SB.auth.getSession();
  if (!data.session) { window.location.href = '/login'; return; }
  _user = data.session.user;
  await loadProjects();
  renderPage();
  initModal();
  initSettingsModal();
})();

// ── Load projects ─────────────────────────────────
async function loadProjects() {
  const { data } = await _SB.from('projects').select('*').eq('user_id', _user.id).order('created_at');
  _projects = data || [];
}

// ── Render ────────────────────────────────────────
function renderPage() {
  const app = document.getElementById('app');
  const name = _user.user_metadata?.full_name || _user.email.split('@')[0];
  const hour = new Date().getHours();
  const greeting = hour < 12 ? 'Доброе утро' : hour < 18 ? 'Добрый день' : 'Добрый вечер';

  if (_projects.length === 0) {
    app.innerHTML = `
      <div class="top-bar">
        <div class="logo"><div class="logo-icon">💰</div><div class="logo-name">MyFinanceAI</div></div>
        <button class="user-chip" id="btn-open-profile">👤 Личный кабинет</button>
      </div>
      <div class="empty-state">
        <div class="empty-icon">🗂️</div>
        <div class="empty-title">Создай первый проект</div>
        <div class="empty-sub">Проект — это отдельное финансовое пространство<br>со своими счетами, направлениями и операциями</div>
        <button class="btn-primary" id="btn-new-empty">+ Создать проект</button>
      </div>`;
  } else {
    const cards = _projects.map((p, i) => `
      <div class="project-card" data-id="${p.id}" style="--accent-color:${p.color};animation-delay:${i*0.06}s">
        <button class="proj-settings-btn" data-settings-id="${p.id}" title="Настройки проекта">⚙️</button>
        <span class="project-emoji">${p.emoji}</span>
        <div class="project-name">${escHtml(p.name)}</div>
        <div class="project-meta">Создан ${formatDate(p.created_at)}</div>
        <div class="project-arrow">→</div>
        <div class="project-accent-bar"></div>
      </div>`).join('');

    app.innerHTML = `
      <div class="top-bar">
        <div class="logo"><div class="logo-icon">💰</div><div class="logo-name">MyFinanceAI</div></div>
        <button class="user-chip" id="btn-open-profile">👤 Личный кабинет</button>
      </div>
      <div class="hero">
        <div class="greeting">${greeting}, ${escHtml(name)} 👋</div>
        <div class="hero-title">Выбери проект</div>
        <div class="hero-sub">Открой финансовое пространство для работы</div>
      </div>
      <div class="projects-grid">
        ${cards}
        <div class="add-card" id="btn-new-card">
          <div class="add-card-icon">＋</div>
          <div class="add-card-text">Новый проект</div>
        </div>
      </div>`;
  }

  bindPageEvents();
}

function bindPageEvents() {
  document.getElementById('btn-open-profile')?.addEventListener('click', () => openProfileModal());
  document.getElementById('btn-new-empty')?.addEventListener('click', openModal);
  document.getElementById('btn-new-card')?.addEventListener('click', openModal);
  document.querySelectorAll('.project-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.proj-settings-btn')) return; // handled separately
      openProject(card.dataset.id);
    });
  });
  document.querySelectorAll('.proj-settings-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      openSettingsModal(btn.dataset.settingsId);
    });
  });
}

// ── Open project ──────────────────────────────────
function openProject(projectId) {
  sessionStorage.setItem('active_project_id', projectId);
  const proj = _projects.find(p => p.id === projectId);
  sessionStorage.setItem('active_project_name', proj?.name || '');
  sessionStorage.setItem('active_project_emoji', proj?.emoji || '💼');
  // Auto-redirect to current month
const now = new Date();
const currentMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
sessionStorage.setItem('active_month', currentMonth);
window.location.href = '/dashboard';
}

// ── Modal ─────────────────────────────────────────
function initModal() {
  const emojiGrid = document.getElementById('emoji-grid');
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-opt' + (e === _selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.onclick = () => { _selectedEmoji = e; document.querySelectorAll('.emoji-opt').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); };
    emojiGrid.appendChild(btn);
  });

  const colorGrid = document.getElementById('color-grid');
  COLORS.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'color-opt' + (c === _selectedColor ? ' selected' : '');
    btn.style.background = c;
    btn.onclick = () => { _selectedColor = c; document.querySelectorAll('.color-opt').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); };
    colorGrid.appendChild(btn);
  });

  document.getElementById('btn-cancel-modal').onclick = closeModal;
  document.getElementById('create-modal').addEventListener('click', e => { if (e.target.id === 'create-modal') closeModal(); });
  document.getElementById('btn-create-proj').onclick = createProject;
  document.getElementById('proj-name').addEventListener('keydown', e => { if (e.key === 'Enter') createProject(); });
}

function openModal() {
  document.getElementById('proj-name').value = '';
  document.getElementById('create-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('proj-name').focus(), 100);
}
function closeModal() { document.getElementById('create-modal').style.display = 'none'; }

async function createProject() {
  const name = document.getElementById('proj-name').value.trim();
  if (!name) { document.getElementById('proj-name').focus(); return; }
  const btn = document.getElementById('btn-create-proj');
  btn.disabled = true; btn.textContent = 'Создаём...';

  const { data, error } = await _SB.from('projects').insert({
    user_id: _user.id, name, emoji: _selectedEmoji, color: _selectedColor,
  }).select().single();

  if (error) { btn.disabled = false; btn.textContent = 'Создать проект →'; alert('Ошибка: ' + error.message); return; }

  // Seed default data for new project
  const defaultData = {
    transactions: [],
    accounts: {
      personal_card: { name: '💳 Личная карта', direction: 'personal', currency: 'RUB', balance: 0 },
      personal_cash: { name: '💵 Наличные', direction: 'personal', currency: 'RUB', balance: 0 },
    },
    funds: {
      cushion: { name: 'Подушка безопасности', balance: 0, currency: 'RUB', icon: '🛡️', color: '#6ee7b7' },
      savings: { name: 'Накопительный счёт', balance: 0, currency: 'RUB', icon: '💰', color: '#93c5fd' },
    },
    fundHistory: [],
    directions: {
      personal: { label: 'Личные финансы', color: '#6ee7b7', icon: '👤', partners: [] },
    },
    dirCategories: {
      personal: {
        in:  ['Выручка','Зарплата','Услуги','Дивиденды','Поступление от клиента','Возврат средств','Перевод входящий','Прочий доход'],
        out: ['Аренда','Зарплата / ФОТ','Реклама и маркетинг','Сервисы и подписки','Связь и интернет','Транспорт','Налоги','Комиссии и эквайринг','Перевод исходящий','Прочий расход'],
      }
    },
    partnerPayments: {},
    rates: { SAR: 20.5, USDT: 77, USD: 90 },
    enabledCurrencies: ['RUB', 'USD'],
    theme: 'dark',
    lang: 'ru',
  };

  const uid = _user.id + '_' + data.id;
  await _SB.from('user_data').insert({ user_id: uid, project_id: data.id, data: defaultData, updated_at: new Date().toISOString() });

  btn.disabled = false; btn.textContent = 'Создать проект →';
  closeModal();
  _projects.push(data);
  renderPage();
}

// ── Profile Modal ─────────────────────────────────
function openProfileModal() {
  const user = _user || {};
  const email = user.email || '';
  const name = (user.user_metadata && user.user_metadata.full_name) ? user.user_metadata.full_name : email.split('@')[0];
  const created = user.created_at ? new Date(user.created_at) : null;
  const mos = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  const createdStr = created ? (created.getDate() + ' ' + mos[created.getMonth()] + ' ' + created.getFullYear()) : '—';

  document.getElementById('profile-content').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:14px;margin-bottom:20px">
      <div style="padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px">
        <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px">Имя</div>
        <div style="font-size:15px;font-weight:600;color:#fff">${name}</div>
      </div>
      <div style="padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px">
        <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px">Почта</div>
        <div style="font-size:15px;font-weight:600;color:#fff">${email}</div>
      </div>
      <div style="padding:14px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:12px">
        <div style="font-size:11px;color:#555;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px">Дата регистрации</div>
        <div style="font-size:15px;font-weight:600;color:#fff">${createdStr}</div>
      </div>
    </div>`;

  document.getElementById('btn-change-password').onclick = async () => {
    await _SB.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/' });
    alert('Письмо для смены пароля отправлено на ' + email);
  };
  document.getElementById('btn-logout-profile').onclick = async () => {
    await _SB.auth.signOut();
    window.location.href = '/login';
  };
  document.getElementById('btn-profile-close').onclick = closeProfileModal;
  document.getElementById('profile-modal').addEventListener('click', e => {
    if (e.target.id === 'profile-modal') closeProfileModal();
  }, { once: true });

  document.getElementById('profile-modal').style.display = 'flex';
}

function closeProfileModal() {
  document.getElementById('profile-modal').style.display = 'none';
}

// ── Settings Modal ─────────────────────────────────
function initSettingsModal() {
  const emojiGrid = document.getElementById('settings-emoji-grid');
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-opt';
    btn.textContent = e;
    btn.dataset.e = e;
    btn.onclick = () => {
      _settingsEmoji = e;
      document.querySelectorAll('#settings-emoji-grid .emoji-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    emojiGrid.appendChild(btn);
  });

  const colorGrid = document.getElementById('settings-color-grid');
  COLORS.forEach(col => {
    const btn = document.createElement('button');
    btn.className = 'color-opt';
    btn.style.background = col;
    btn.dataset.c = col;
    btn.onclick = () => {
      _settingsColor = col;
      document.querySelectorAll('#settings-color-grid .color-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    };
    colorGrid.appendChild(btn);
  });

  document.getElementById('btn-cancel-settings').onclick = closeSettingsModal;
  document.getElementById('settings-modal').addEventListener('click', e => { if (e.target.id === 'settings-modal') closeSettingsModal(); });

  document.getElementById('btn-save-settings').onclick = async () => {
    const name = document.getElementById('settings-proj-name').value.trim();
    if (!name) return;
    const btn = document.getElementById('btn-save-settings');
    btn.disabled = true; btn.textContent = 'Сохраняем...';
    const { error } = await _SB.from('projects').update({ name, emoji: _settingsEmoji, color: _settingsColor }).eq('id', _editingProjectId);
    btn.disabled = false; btn.textContent = 'Сохранить';
    if (error) { alert('Ошибка: ' + error.message); return; }
    const proj = _projects.find(p => p.id === _editingProjectId);
    if (proj) { proj.name = name; proj.emoji = _settingsEmoji; proj.color = _settingsColor; }
    closeSettingsModal();
    renderPage();
  };

  document.getElementById('btn-delete-proj').onclick = async () => {
    const proj = _projects.find(p => p.id === _editingProjectId);
    if (!confirm('Удалить проект "' + (proj?.name || '') + '"? Все данные будут потеряны!')) return;
    // Delete project data
    const uid = _user.id + '_' + _editingProjectId;
    await _SB.from('user_data').delete().eq('user_id', uid);
    await _SB.from('projects').delete().eq('id', _editingProjectId);
    _projects = _projects.filter(p => p.id !== _editingProjectId);
    closeSettingsModal();
    renderPage();
  };
}

function openSettingsModal(projectId) {
  _editingProjectId = projectId;
  const proj = _projects.find(p => p.id === projectId);
  if (!proj) return;
  document.getElementById('settings-proj-name').value = proj.name;
  _settingsEmoji = proj.emoji;
  _settingsColor = proj.color;
  // Update selections
  document.querySelectorAll('#settings-emoji-grid .emoji-opt').forEach(b => {
    b.classList.toggle('selected', b.dataset.e === proj.emoji);
  });
  document.querySelectorAll('#settings-color-grid .color-opt').forEach(b => {
    b.classList.toggle('selected', b.dataset.c === proj.color);
  });
  document.getElementById('settings-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('settings-proj-name').focus(), 100);
}

function closeSettingsModal() { document.getElementById('settings-modal').style.display = 'none'; }

// ── Helpers ───────────────────────────────────────
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(iso) {
  const d = new Date(iso);
  const months = ['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}
