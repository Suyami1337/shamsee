<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Смена пароля</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#06060f;color:#f0f0f0;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .bg-mesh{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
  .orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:0.1}
  .orb-1{width:500px;height:500px;background:#6ee7b7;top:-150px;left:-100px}
  .orb-2{width:400px;height:400px;background:#3b82f6;bottom:-100px;right:-80px}
  .bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);background-size:48px 48px}
  .card{position:relative;z-index:1;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:24px;padding:40px;width:100%;max-width:420px}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
  .logo-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#6ee7b7,#3b82f6);display:flex;align-items:center;justify-content:center;font-size:18px}
  .logo-name{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:#fff}
  h1{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:#fff;margin-bottom:8px}
  .sub{font-size:14px;color:#555;margin-bottom:32px;line-height:1.5}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:8px}
  .field input{width:100%;padding:13px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:11px;color:#fff;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.15s}
  .field input:focus{border-color:rgba(110,231,183,0.4)}
  .field input::placeholder{color:#333}
  .btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#6ee7b7,#3b82f6);color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;transition:opacity 0.15s}
  .btn:hover{opacity:0.9}
  .btn:disabled{opacity:0.5;cursor:not-allowed}
  .msg-error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:12px 16px;font-size:13px;color:#f87171;margin-bottom:16px;display:none}
  .msg-success{background:rgba(110,231,183,0.1);border:1px solid rgba(110,231,183,0.3);border-radius:10px;padding:12px 16px;font-size:13px;color:#6ee7b7;margin-bottom:16px;display:none;text-align:center}

  @media (max-width: 600px) {
    body { align-items: flex-start; padding: 0; overflow-y: auto; }
    .card {
      max-width: 100%; min-height: 100vh; min-height: 100dvh;
      border-radius: 0; border: none;
      padding: 48px 24px 40px;
      padding-top: max(48px, env(safe-area-inset-top, 48px));
      padding-bottom: max(40px, env(safe-area-inset-bottom, 40px));
      padding-left: max(24px, env(safe-area-inset-left, 24px));
      padding-right: max(24px, env(safe-area-inset-right, 24px));
    }
    .field input { font-size: 16px; min-height: 52px; padding: 15px 16px; }
    .btn { padding: 17px; font-size: 16px; min-height: 54px; border-radius: 14px; }
    h1 { font-size: 24px; }
    .orb-1 { width: 280px; height: 280px; }
    .orb-2 { width: 220px; height: 220px; }
  }
</style>
</head>
<body>
<div class="bg-mesh"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="bg-grid"></div>

<div class="card" id="card">
  <div style="text-align:center;padding:40px 0;color:#555;font-size:14px">Проверка ссылки...</div>
</div>

<script>
const sb = supabase.createClient(
  'https://kkaixwmqclsudabgofcf.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtrYWl4d21xY2xzdWRhYmdvZmNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MDc4ODcsImV4cCI6MjA4ODA4Mzg4N30.zD9M-Tthd_FBdcrXuOukEdxuWnIaR0yWfm0CnWyuhb0'
);

function showExpired() {
  document.getElementById('card').innerHTML = `
    <div class="logo"><div class="logo-icon">💰</div><div class="logo-name">MyFinanceAI</div></div>
    <h1>Ссылка истекла</h1>
    <div class="sub" style="color:#f87171">Эта ссылка недействительна или уже использована. Запроси новую в личном кабинете.</div>
    <a href="/login" style="display:block;margin-top:24px;text-align:center;color:#6ee7b7;font-size:14px;text-decoration:none">← Вернуться ко входу</a>
  `;
}

(async () => {
  // Case 1: hash-based recovery token stored by index.html
  const recoveryHash = sessionStorage.getItem('recovery_hash');
  if (recoveryHash) {
    sessionStorage.removeItem('recovery_hash');

    // Parse tokens from hash manually and set session via exchangeCodeForSession alternative
    const hashStr = recoveryHash.replace(/^#/, '');
    const hashParams = new URLSearchParams(hashStr);
    const accessToken  = hashParams.get('access_token');
    const refreshToken = hashParams.get('refresh_token');

    if (accessToken && refreshToken) {
      try {
        const { error } = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
        if (error) { console.error('setSession error:', error); showExpired(); return; }
      } catch(e) {
        console.error('setSession exception:', e); showExpired(); return;
      }
    } else {
      // Fallback: set hash and wait for Supabase onAuthStateChange
      await new Promise((resolve) => {
        window.location.hash = hashStr;
        const { data: { subscription } } = sb.auth.onAuthStateChange((event) => {
          if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') {
            subscription.unsubscribe();
            resolve();
          }
        });
        // Safety timeout — 5s instead of hardcoded 800ms
        setTimeout(() => { subscription.unsubscribe(); resolve(); }, 5000);
      });
    }
  }

  // Case 2: PKCE flow — token already handled by index.html, session should exist
  const { data } = await sb.auth.getSession();
  if (!data.session) { showExpired(); return; }
  showForm();
})();

function showForm() {
  document.getElementById('card').innerHTML = `
    <div class="logo"><div class="logo-icon">💰</div><div class="logo-name">MyFinanceAI</div></div>
    <h1>Новый пароль 🔐</h1>
    <div class="sub">Придумай надёжный пароль для своего аккаунта</div>
    <div class="msg-error" id="err"></div>
    <div class="msg-success" id="succ"></div>
    <div class="field">
      <label>Новый пароль</label>
      <input type="password" id="p1" placeholder="Минимум 6 символов" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Подтвердите новый пароль</label>
      <input type="password" id="p2" placeholder="Повторите пароль" autocomplete="new-password">
    </div>
    <button class="btn" id="btn-save">Сменить пароль →</button>
  `;
  document.getElementById('p1').focus();
  document.getElementById('p2').addEventListener('keydown', e => { if (e.key === 'Enter') save(); });
  document.getElementById('btn-save').addEventListener('click', save);
}

async function save() {
  const p1  = document.getElementById('p1').value;
  const p2  = document.getElementById('p2').value;
  const err  = document.getElementById('err');
  const succ = document.getElementById('succ');
  err.style.display = 'none';
  succ.style.display = 'none';

  if (!p1 || !p2)    { err.textContent = 'Заполни оба поля';    err.style.display = 'block'; return; }
  if (p1 !== p2)     { err.textContent = 'Пароли не совпадают'; err.style.display = 'block'; return; }
  if (p1.length < 6) { err.textContent = 'Минимум 6 символов';  err.style.display = 'block'; return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  btn.textContent = 'Сохраняем...';

  const { error } = await sb.auth.updateUser({ password: p1 });

  if (error) {
    btn.disabled = false;
    btn.textContent = 'Сменить пароль →';
    err.textContent = 'Ошибка: ' + error.message;
    err.style.display = 'block';
    return;
  }

  succ.textContent = '✓ Пароль изменён! Перенаправляем на страницу входа...';
  succ.style.display = 'block';
  btn.style.display = 'none';

  await sb.auth.signOut();
  setTimeout(() => { window.location.href = '/login'; }, 2000);
}
</script>
</body>
</html>
