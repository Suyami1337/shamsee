<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { background: #080808; margin: 0; }
</style>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('mobile') === '1') { window.location.replace('/finance-mobile.html'); return; }
  if (params.get('mobile') === '0') { window.location.replace('/finance.html'); return; }
  var ua = navigator.userAgent || '';
  var isMobile = /iPhone|iPad|iPod|Android|BlackBerry|Windows Phone|IEMobile|Opera Mini|Silk|webOS/i.test(ua);
  var isNarrow = window.innerWidth <= 768;
  if (isMobile || isNarrow) {
    window.location.replace('/finance-mobile.html');
  } else {
    window.location.replace('/finance.html');
  }
})();
</script>
</head>
<body></body>
</html>
