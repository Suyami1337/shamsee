<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyFinanceAI</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background:#080808; color:#fff; font-family: 'SF Pro Display', 'Segoe UI', -apple-system, sans-serif; min-height: 100vh; transition: background 0.2s, color 0.2s; }
  body.light { background: #f4f6fb !important; color: #1a1a2e !important; }
  select, input { outline: none; }
  select option { background: #1a1a1a; color:#fff; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #111; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  .app { max-width: 1200px; margin: 0 auto; padding: 24px 20px; padding-top: 80px; }
  .header { display: flex; flex-direction: column; gap: 10px; padding: 14px 20px 12px; background: rgba(15,15,25,0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.07); position: sticky; top: 0; z-index: 100; margin-bottom: 24px; }
  .header-left .subtitle { font-size: 11px; color:#555; letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
  .header-left .title { font-size: 28px; font-weight: 800; letter-spacing: -0.02em; }
  .header-right { display: flex; gap: 10px; }
  .btn-rates { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 10px 16px; color:#888; font-size: 13px; cursor: pointer; }
  .btn-add { background: linear-gradient(135deg, #6ee7b7, #3b82f6); border: none; border-radius: 12px; padding: 10px 20px; color: #000; font-weight: 700; font-size: 14px; cursor: pointer; }
  .btn-rates:hover { background: rgba(255,255,255,0.1); }
  .btn-add:hover { opacity: 0.9; }
  .rates-bar { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 10px 20px; margin-bottom: 24px; display: flex; gap: 24px; font-size: 13px; color:#888; flex-wrap: wrap; align-items: center; }
  .rates-bar strong { color: #fbbf24; }
  .rates-bar .usdt { color: #a78bfa; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px 24px; position: relative; overflow: hidden; }
  .stat-card .icon { position: absolute; top: -10px; right: -10px; font-size: 64px; opacity: 0.07; }
  .stat-card .label { font-size: 12px; color:#888; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-card .value { font-size: 24px; font-weight: 700; font-family: monospace; }
  .tabs { display: flex; gap: 6px; margin-bottom: 24px; background: rgba(255,255,255,0.03); border-radius: 16px; padding: 5px; }
  .tab { flex: 1; padding: 12px 10px; border-radius: 11px; background: transparent; border: none; color:#666; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .tab.active { background: linear-gradient(135deg, rgba(110,231,183,0.15), rgba(59,130,246,0.15)); border: 1px solid rgba(110,231,183,0.2); color:#fff; font-weight: 700; }
  .tab:hover:not(.active) { color: #bbb; background: rgba(255,255,255,0.04); }
  .dir-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; margin-bottom: 20px; }
  .dir-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 24px; cursor: grab; transition: all 0.2s; }
  .dir-card:active { cursor: grabbing; }
  .dir-card:hover { border-color: rgba(255,255,255,0.15); }
  .dir-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .dir-icon { font-size: 28px; }
  .dir-name { font-size: 16px; font-weight: 700; }
  .dir-sub { font-size: 11px; color:#888; }
  .dir-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .metric { border-radius: 10px; padding: 10px 14px; }
  .metric .m-label { font-size: 11px; color:#888; margin-bottom: 4px; }
  .metric .m-value { font-size: 15px; font-weight: 700; font-family: monospace; }
  .metric-income { background: rgba(110,231,183,0.07); } .metric-income .m-value { color: #6ee7b7; }
  .metric-expense { background: rgba(239,68,68,0.07); } .metric-expense .m-value { color: #f87171; }
  .metric-partner { background: rgba(251,191,36,0.07); } .metric-partner .m-value { color: #fbbf24; }
  .tx-item-hover { }
  .tx-actions { display:flex;gap:4px;margin-left:8px;flex-shrink:0; }
  .tx-act-btn { padding:4px 8px;border-radius:6px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#888;cursor:pointer;font-size:12px;line-height:1; }
  .tx-act-btn:hover { background:rgba(255,255,255,0.09);color:#ccc; }
  .tx-act-del { border-color:rgba(239,68,68,0.25);color:#f87171; }
  .tx-act-del:hover { background:rgba(239,68,68,0.1); }
  .metric-profit { background: rgba(167,139,250,0.07); } .metric-profit .m-value { color: #a78bfa; }
  .metric-profit-neg .m-value { color: #f87171; }
  .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; overflow: hidden; margin-bottom: 16px; }
  .card-header { padding: 18px 24px; border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; justify-content: space-between; align-items: center; }
  .card-title { font-weight: 700; font-size: 15px; }
  .chart-wrap { padding: 24px; }
  .accounts-row { display: grid; grid-template-columns: 1fr auto auto; padding: 12px 24px; border-bottom: 1px solid rgba(255,255,255,0.04); align-items: center; gap: 16px; }
  .acc-name { font-size: 13px; color: #ddd; }
  .acc-dir { font-size: 11px; color:#888; }
  .acc-bal { text-align: right; }
  .acc-bal .main { font-size: 14px; font-weight: 600; font-family: monospace; }
  .acc-bal .sub { font-size: 11px; color:#888; }
  .acc-dot { width: 8px; height: 8px; border-radius: 50%; }
  .tx-item { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 12px 16px; margin-bottom: 8px; }
  .tx-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .tx-icon-in { background: rgba(110,231,183,0.15); }
  .tx-icon-out { background: rgba(239,68,68,0.15); }
  .tx-info .tx-cat { font-size: 13px; color: #ddd; }
  .tx-info .tx-meta { font-size: 11px; color:#888; }
  .tx-amount { text-align: right; }
  .tx-amount .main { font-weight: 700; font-family: monospace; font-size: 14px; }
  .tx-amount .sub { font-size: 11px; color:#555; }
  .tx-amount-in .main { color: #6ee7b7; }
  .tx-amount-out .main { color: #f87171; }
  .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15); background: transparent; color:#fff; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .filter-btn.active { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
  .odds-section { margin-bottom: 20px; }
  .odds-summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: rgba(255,255,255,0.05); }
  .odds-sum-cell { background: #0d0d0d; padding: 16px 20px; }
  .odds-sum-cell .os-label { font-size: 11px; color:#888; margin-bottom: 4px; }
  .odds-sum-cell .os-value { font-size: 16px; font-weight: 700; font-family: monospace; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 10px 16px; text-align: left; font-size: 12px; color:#888; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,0.08); }
  td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .td-right { text-align: right; font-family: monospace; }
  .empty { text-align: center; padding: 60px; color:#555; font-size: 14px; }
  .two-col { display: grid; grid-template-columns: 1fr 2fr; gap: 16px; }
  .two-col-equal { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 700px) { .two-col, .two-col-equal { grid-template-columns: 1fr; } .dir-grid { grid-template-columns: 1fr; } }

  /* MODAL */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
  .modal { background: #111; border: 1px solid rgba(255,255,255,0.12); border-radius: 24px; padding: 32px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-close { background: none; border: none; color:#888; font-size: 28px; cursor: pointer; line-height: 1; }
  .form-grid { display: grid; gap: 20px; }
  .form-row { display: grid; gap: 14px; }
  .form-row-2 { grid-template-columns: 1fr 1fr; }
  .form-row-3 { grid-template-columns: 2fr 1fr; }
  .form-label { font-size: 12px; color:#888; margin-bottom: 6px; }
  .form-inp { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 10px 14px; color:#fff; font-size: 14px; width: 100%; }
  .form-inp:focus { border-color: rgba(110,231,183,0.5); }
  .btn-submit { background: linear-gradient(135deg, #6ee7b7, #3b82f6); border: none; border-radius: 12px; padding: 14px; color: #000; font-weight: 700; font-size: 15px; cursor: pointer; width: 100%; margin-top: 8px; }
  .btn-submit:hover { opacity: 0.9; }

  /* PIE legend */
  .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .month-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; padding: 24px; cursor: pointer; transition: all 0.2s; }
  .month-card:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.06); transform: translateY(-2px); }
  .month-has-data { border-color: rgba(110,231,183,0.2); }
  .month-has-data:hover { border-color: #6ee7b7; }
  .month-label { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 2px; }
  .month-year { font-size: 13px; color:#555; margin-bottom: 16px; }
  .month-stats { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .month-stat-row { display: flex; justify-content: space-between; font-size: 13px; color: #aaa; font-family: monospace; }
  .month-tx-count { font-size: 11px; color:#555; }
  .month-empty { font-size: 13px; color: #444; margin-top: 8px; }
  .pie-legend { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .pie-leg-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color:#888; }
  .pie-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
  .acc-tabs-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
  .acc-tab { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 10px 16px; color:#888; cursor: pointer; text-align: left; transition: all 0.15s; }
  .acc-tab:hover { border-color: rgba(255,255,255,0.15); color:#ccc; }
  .acc-tab-active { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); color:#fff; }

  /* Mode Picker */
  .mode-picker-bg { position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px; }
  .mode-picker { background:rgba(16,16,28,0.98);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:32px;width:100%;max-width:420px; }
  .mode-btn { width:100%;padding:20px 24px;border-radius:16px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);cursor:pointer;text-align:left;transition:all 0.2s;margin-bottom:12px;display:flex;align-items:center;gap:16px; }
  .mode-btn:hover { background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);transform:translateY(-1px); }
  .mode-btn-icon { font-size:32px;flex-shrink:0; }
  .mode-btn-title { font-size:16px;font-weight:700;color:#fff;margin-bottom:4px; }
  .mode-btn-sub { font-size:13px;color:#555; }

  /* AI Chat */
  .ai-chat-bg { position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;overflow:hidden;touch-action:none; }
  .ai-chat-wrap { background:rgba(12,12,22,0.99);border:1px solid rgba(255,255,255,0.1);border-radius:24px;width:100%;max-width:780px;height:90vh;max-height:900px;display:flex;flex-direction:column;overflow:hidden;position:relative; }
  .ai-chat-header { padding:18px 20px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;justify-content:space-between;align-items:center;flex-shrink:0; }
  .ai-chat-title { font-size:16px;font-weight:800;color:#fff;display:flex;align-items:center;gap:8px; }
  .ai-chat-messages { flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;overscroll-behavior:contain;-webkit-overflow-scrolling:touch; }
  .ai-msg { max-width:85%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.5; }
  .ai-msg-assistant { background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:#ddd;align-self:flex-start;border-radius:4px 16px 16px 16px; }
  .ai-msg-user { background:linear-gradient(135deg,rgba(110,231,183,0.2),rgba(59,130,246,0.2));border:1px solid rgba(110,231,183,0.2);color:#fff;align-self:flex-end;border-radius:16px 4px 16px 16px; }
  .ai-msg-img { max-width:100%;border-radius:10px;margin-top:8px;display:block; }
  .ai-chat-input-area { padding:16px;border-top:1px solid rgba(255,255,255,0.07);flex-shrink:0; }
  .ai-pending-txs { background:rgba(110,231,183,0.05);border:1px solid rgba(110,231,183,0.2);border-radius:14px;padding:14px;margin-bottom:12px; }
  .ai-pending-tx-row { display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:13px; }
  .ai-pending-tx-row:last-child { border-bottom:none; }
  .ai-typing { display:flex;gap:4px;align-items:center;padding:12px 16px; }
  .ai-typing span { width:7px;height:7px;border-radius:50%;background:#555;animation:aiTyping 1.2s infinite; }
  .ai-typing span:nth-child(2){animation-delay:0.2s} .ai-typing span:nth-child(3){animation-delay:0.4s}
  @keyframes aiTyping { 0%,60%,100%{transform:translateY(0);background:#555} 30%{transform:translateY(-6px);background:#6ee7b7} }

  .bg-mesh { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
  .orb { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.12; animation: float 14s ease-in-out infinite; }
  .orb-1 { width: 500px; height: 500px; background: #6ee7b7; top: -150px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: #3b82f6; bottom: -100px; right: -80px; animation-delay: -5s; }
  @keyframes float { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,-30px)} }
  .bg-grid { position: fixed; inset: 0; z-index: 0; pointer-events: none; background-image: linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px); background-size: 48px 48px; }
</style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="bg-mesh"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="bg-grid"></div>
<div id="header-root"></div>
<div class="app" id="app">
  <div style="display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:120px;gap:16px;min-height:60vh">
  <div style="font-size:48px;animation:spin 2s linear infinite">⚙️</div>
  <div style="font-size:15px;color:#555;letter-spacing:0.05em">Загрузка...</div>
</div>
<style>@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style>
</div>


<script src="shared.js"></script>
<script>
// ── Desktop init ──────────────────────────────────
// shared.js contains all business logic.
// finance.html is the desktop shell — render() and all UI are already defined in shared.js.
(async () => {
  const ok = await initAuth();
  if (!ok) return;
  let saved = null;
  try {
    saved = await Promise.race([
      cloudLoad(),
      new Promise((_,reject) => setTimeout(() => reject(new Error('cloudLoad timeout 10s')), 10000))
    ]);
  } catch(e) {
    console.error('[init] cloudLoad error:', e);
    _appRoot().innerHTML = '<div style="color:orange;padding:40px;font-family:monospace">Ошибка загрузки данных: ' + e.message + '<br><br>Обнови страницу или проверь соединение.</div>';
    return;
  }
  if (saved) {
    Object.assign(state, {
      transactions:    saved.transactions    || [],
      accounts:        saved.accounts        || {},
      funds:           saved.funds           || {},
      fundHistory:     saved.fundHistory     || [],
      directions:      saved.directions      || {},
      dirCategories:   saved.dirCategories   || {},
      partnerPayments: saved.partnerPayments || {},
      enabledModules:  saved.enabledModules  || state.enabledModules,
      rates:           saved.rates           || state.rates,
      enabledCurrencies: saved.enabledCurrencies || ['RUB','USD'],
      theme:           saved.theme           || 'dark',
      lang:            saved.lang            || 'ru',
      dirOrder:        saved.dirOrder        || null,
      accOrder:        saved.accOrder        || null,
      fundOrder:       saved.fundOrder       || null,
      tabOrder:        saved.tabOrder        || null,
    });
    DIRECTIONS = state.directions;
  } else {
    preloadIfEmpty();
  }
  state.form = defaultForm();
  window._appReady = true;
  applyTheme();
  render();
  fetchLiveRates().then(() => render());
})();
</script>
</body>
</html>
